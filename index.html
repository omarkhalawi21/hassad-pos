<!DOCTYPE html>
<html lang="en">

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; object-src 'none'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net; frame-src 'self' blob:; base-uri 'self'; form-action 'self';" />
<title>Hassad POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  /* Same-specificity overrides load after tailwind.css and win without a rebuild. */
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; padding:.55rem 1.1rem; border-radius:.8rem; font-weight:600; font-size:.875rem; cursor:pointer; border:1px solid transparent; transition:all .12s; }
  .btn-primary { background:#6e4220; color:#fff; } .btn-primary:hover { background:#573419; }
  .btn-ghost { background:#fff; color:#334155; border-color:#e2e8f0; } .btn-ghost:hover { background:#f8fafc; }
  .btn-danger { background:#fff; color:#a93838; border-color:#f1d4d4; } .btn-danger:hover { background:#fdf2f2; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .input { width:100%; padding:.55rem .8rem; border:1px solid #e2e8f0; border-radius:.7rem; font-size:.9rem; background:#fff; }
  .input:focus { outline:2px solid #c9945566; border-color:#c99455; }
  .label { display:block; font-size:.72rem; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:#64748b; margin-bottom:.3rem; }
  .tab { padding:.5rem 1rem; font-size:.875rem; font-weight:600; color:#64748b; border-bottom:2px solid transparent; background:none; cursor:pointer; }
  .tab.active { color:#6e4220; border-bottom-color:#6e4220; }
  .badge { display:inline-block; padding:.15rem .6rem; border-radius:999px; font-size:.72rem; font-weight:600; }
  .badge-green { background:#d1fae5; color:#047857; } .badge-red { background:#fee2e2; color:#b91c1c; }
  .badge-slate { background:#f1f5f9; color:#475569; } .badge-amber { background:#fef3c7; color:#b45309; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); color:#fff; padding:.7rem 1.3rem; border-radius:.8rem; font-size:.875rem; font-weight:500; z-index:9999; box-shadow:0 10px 30px rgba(15,23,42,.25); }
  #modal-root { position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:1000; display:flex; align-items:center; justify-content:center; padding:1rem; }
  .modal-box { background:#fff; border-radius:1.2rem; width:100%; max-width:640px; max-height:92vh; overflow-y:auto; }
  .pos-item { transition:transform .06s; } .pos-item:active { transform:scale(.96); }
</style>
</head>
<body class="bg-brand-50 font-sans text-slate-800">
<div id="app">
  <div class="min-h-screen flex items-center justify-center">
    <div class="text-center">
      <div class="w-14 h-14 rounded-full border-4 border-brand-200 border-t-brand-700 animate-spin mx-auto"></div>
      <div class="mt-4 text-sm text-slate-500 font-display">Loading…</div>
    </div>
  </div>
</div>
<script>
/* ============================================================
   HASSAD POS — single-file app. Conventions ported from the
   Hassad HR app; see CLAUDE.md. RLS is the security boundary —
   every UI gate here is convenience, not protection.
============================================================ */

/* -------------------- CONFIG -------------------- */
// Paste the new Supabase project's URL + publishable key here.
// The publishable key is safe in client source ONLY because RLS
// is enforced on every table (see supabase-pos.sql).
const SUPABASE_URL = 'https://lqfardjkvoyzutsqlfco.supabase.co';
const SUPABASE_KEY = 'sb_publishable_yyu7cVkXy4ZgWXkqimNz4Q_1gPguJ90';
const sb = (() => {
  try {
    if (!/^https:\/\/.+\.supabase\.co$/.test(SUPABASE_URL)) return null; // placeholder → config gate, not a crash
    return window.supabase?.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    }) || null;
  } catch (e) { console.error('Supabase init failed:', e); return null; }
})();

/* -------------------- HELPERS -------------------- */
const $ = sel => document.querySelector(sel);
function escapeHTML(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function toast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.background = type === 'error' ? '#b91c1c' : type === 'success' ? '#047857' : '#0f172a';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.transition = 'opacity .2s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 200); }, 2600);
}
// Missing-DB-object codes mean a skipped migration, not a bug.
function humanizeError(err) {
  const code = err?.code || '';
  if (['PGRST202','42883','42P01','42703'].includes(code)) return 'Database schema is out of date — run the latest supabase-pos.sql in the SQL editor.';
  if (code === '42501') return 'You do not have permission for that.';
  if (code === '23505') return 'That already exists.';
  return err?.message || 'Something went wrong.';
}
function todayISO() { return new Date().toISOString().slice(0, 10); }
function fmtMoney(n) { return Number(n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtDateTime(ts) { return ts ? new Date(ts).toLocaleString(undefined, { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '—'; }
// VAT-inclusive price → contained VAT portion.
function vatPortion(totalInc, rate) { return totalInc * rate / (100 + rate); }

/* -------------------- STATE + MAPPERS -------------------- */
function emptyState() {
  return {
    session: null,
    settings: { companyName:'Hassad Coffee Roasters', companyNameAr:'', vatNumber:'', crNumber:'', currency:'SAR', vatRate:15, receiptFooterEn:'', receiptFooterAr:'' },
    settingsId: null,
    branches: [], staff: [], categories: [], items: [], branchOff: [],
    modGroups: [], modOptions: [], itemModGroups: [],  // [{itemId, groupId, minSelect, maxSelect}]
    menuGroups: [], itemMenuGroups: [],                // channel menus (Koinz Menu, Taker)
    devices: [], deviceCategories: [],                 // printers per branch + kitchen category filter
    orders: [],           // capped recent window (today + last 7 days)
    shifts: [],           // open shifts + last 7 days of closed ones
    shiftMovements: [],   // drawer movements for the loaded shifts window
    orderDetailCache: {}, // orderId → { items:[], payments:[] } fetched on demand for receipts
  };
}
let state = emptyState();

function mapSettingsFromDb(r) {
  return { _id: r.id, companyName: r.company_name || '', companyNameAr: r.company_name_ar || '',
    vatNumber: r.vat_number || '', crNumber: r.cr_number || '', currency: r.currency || 'SAR',
    vatRate: Number(r.vat_rate) || 15, receiptFooterEn: r.receipt_footer_en || '', receiptFooterAr: r.receipt_footer_ar || '' };
}
function mapBranchFromDb(r) { return { id: r.id, name: r.name || '', nameAr: r.name_ar || '', active: !!r.active }; }
function mapStaffFromDb(r) {
  return { id: r.id, userId: r.user_id, email: r.email || '', firstName: r.first_name || '', lastName: r.last_name || '',
    role: r.role || 'cashier', branchId: r.branch_id, active: !!r.active };
}
function mapCategoryFromDb(r) { return { id: r.id, nameEn: r.name_en || '', nameAr: r.name_ar || '', reference: r.reference || '', sortOrder: Number(r.sort_order) || 0, active: !!r.active }; }
function mapItemFromDb(r) {
  return { id: r.id, categoryId: r.category_id, nameEn: r.name_en || '', nameAr: r.name_ar || '',
    price: Number(r.price) || 0, sku: r.sku || '', photo: r.photo || '', sortOrder: Number(r.sort_order) || 0, active: !!r.active };
}
function mapShiftFromDb(r) {
  return { id: r.id, branchId: r.branch_id, businessDate: r.business_date, status: r.status || 'open',
    openingFloat: Number(r.opening_float) || 0, openedBy: r.opened_by, openedAt: r.opened_at,
    closedBy: r.closed_by, closedAt: r.closed_at,
    expectedCash: r.expected_cash == null ? null : Number(r.expected_cash),
    countedCash: r.counted_cash == null ? null : Number(r.counted_cash),
    overShort: r.over_short == null ? null : Number(r.over_short), notes: r.notes || '' };
}
function mapModGroupFromDb(r) {
  return { id: r.id, reference: r.reference || '', nameEn: r.name_en || '', nameAr: r.name_ar || '',
    required: !!r.required, sortOrder: Number(r.sort_order) || 0, active: !!r.active };
}
function mapModOptionFromDb(r) {
  return { id: r.id, groupId: r.group_id, nameEn: r.name_en || '', nameAr: r.name_ar || '',
    priceDelta: Number(r.price_delta) || 0, sku: r.sku || '', sortOrder: Number(r.sort_order) || 0, active: !!r.active };
}
function mapShiftMovementFromDb(r) {
  return { id: r.id, shiftId: r.shift_id, type: r.type, amount: Number(r.amount) || 0,
    reason: r.reason || '', notes: r.notes || '', createdBy: r.created_by, createdAt: r.created_at };
}
const MOVEMENT_TYPES = { pay_in: 'Pay In', pay_out: 'Pay Out', cash_drop: 'Cash Drop', open_drawer: 'Open Drawer', spot_check: 'Spot Check' };
// Signed effect on the drawer: pay_in adds, pay_out/cash_drop remove,
// open_drawer and spot_check are audit records with no cash effect.
function movementDelta(m) {
  return m.type === 'pay_in' ? m.amount : (m.type === 'pay_out' || m.type === 'cash_drop') ? -m.amount : 0;
}
// Small resized product photos only; validated before every <img> injection.
const PHOTO_DATA_URL_RE = /^data:image\/(png|jpe?g|webp);base64,[A-Za-z0-9+/=]+$/;
function safePhoto(p) { return p && PHOTO_DATA_URL_RE.test(p) ? p : ''; }
function mapOrderFromDb(r) {
  return { id: r.id, branchId: r.branch_id, businessDate: r.business_date, orderNo: Number(r.order_no) || 0,
    status: r.status || 'completed', subtotal: Number(r.subtotal) || 0, vatAmount: Number(r.vat_amount) || 0,
    total: Number(r.total) || 0, cashierId: r.cashier_id, voidReason: r.void_reason || '', createdAt: r.created_at,
    orderType: r.order_type || 'pickup', discountAmount: Number(r.discount_amount) || 0,
    discountReason: r.discount_reason || '', returnedAt: r.returned_at, returnedBy: r.returned_by,
    shiftId: r.shift_id || null, note: r.note || '', terminal: r.terminal || '' };
}
const ORDER_TYPES = { pickup: 'Pickup', dine_in: 'Dine-in', delivery: 'Delivery', drive_thru: 'Drive-thru' };
function mapOrderItemFromDb(r) {
  return { id: r.id, orderId: r.order_id, itemId: r.item_id, nameEn: r.name_en || '', nameAr: r.name_ar || '',
    unitPrice: Number(r.unit_price) || 0, qty: Number(r.qty) || 0, lineTotal: Number(r.line_total) || 0,
    modifiers: Array.isArray(r.modifiers) ? r.modifiers : [] };
}
function mapPaymentFromDb(r) {
  return { id: r.id, orderId: r.order_id, method: r.method || 'cash', amount: Number(r.amount) || 0,
    tendered: r.tendered == null ? null : Number(r.tendered), changeGiven: r.change_given == null ? null : Number(r.change_given) };
}

/* -------------------- ROLES -------------------- */
function currentStaff() {
  if (!state.session) return null;
  return state.staff.find(s => s.userId === state.session.userId) || null;
}
function currentRole() { return currentStaff()?.role || 'none'; }
function hasRole(...roles) { return roles.includes(currentRole()); }
function isAdmin() { return currentRole() === 'admin'; }
function myBranchId() { return currentStaff()?.branchId || null; }
function branchName(id) { return state.branches.find(b => b.id === id)?.name || '—'; }
function staffName(id) { const s = state.staff.find(x => x.id === id); return s ? `${s.firstName} ${s.lastName}`.trim() || s.email : '—'; }

/* -------------------- DATA LOAD -------------------- */
async function loadAll() {
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
  const [settingsR, branchesR, staffR, categoriesR, itemsR, offR, ordersR, shiftsR, movementsR, modGroupsR, modOptionsR, itemModsR, menuGroupsR, itemMenuGroupsR, devicesR, deviceCatsR] = await Promise.all([
    sb.from('pos_settings').select('*').limit(1).maybeSingle(),
    sb.from('branches').select('*').order('name'),
    sb.from('staff').select('*').order('first_name'),
    sb.from('menu_categories').select('*').order('sort_order'),
    sb.from('menu_items').select('*').order('sort_order'),
    sb.from('menu_item_branch_off').select('*'),
    // Recent window only — orders grow forever; history beyond this
    // stays in the DB (reports can query on demand later).
    sb.from('orders').select('*').gte('business_date', weekAgo.toISOString().slice(0,10))
      .order('created_at', { ascending: false }).limit(1000),
    // Open shifts regardless of age (an accidentally-left-open till must
    // surface), plus the recent closed window for the dashboard.
    sb.from('shifts').select('*')
      .or(`status.eq.open,opened_at.gte.${weekAgo.toISOString()}`)
      .order('opened_at', { ascending: false }).limit(200),
    sb.from('shift_movements').select('*')
      .gte('created_at', weekAgo.toISOString())
      .order('created_at', { ascending: false }).limit(500),
    sb.from('modifier_groups').select('*').order('sort_order'),
    sb.from('modifier_options').select('*').order('sort_order'),
    sb.from('item_modifier_groups').select('*'),
    sb.from('menu_groups').select('*').order('name'),
    sb.from('item_menu_groups').select('*'),
    sb.from('devices').select('*').order('name'),
    sb.from('device_categories').select('*'),
  ]);
  if (settingsR.data) { const s = mapSettingsFromDb(settingsR.data); state.settingsId = s._id; state.settings = s; }
  state.branches   = (branchesR.data   || []).map(mapBranchFromDb);
  state.staff      = (staffR.data      || []).map(mapStaffFromDb);
  state.categories = (categoriesR.data || []).map(mapCategoryFromDb);
  state.items      = (itemsR.data      || []).map(mapItemFromDb);
  state.branchOff  = (offR.data        || []).map(r => ({ itemId: r.item_id, branchId: r.branch_id }));
  state.orders     = (ordersR.data     || []).map(mapOrderFromDb);
  state.shifts     = (shiftsR?.data    || []).map(mapShiftFromDb);
  state.shiftMovements = (movementsR?.data || []).map(mapShiftMovementFromDb);
  state.modGroups      = (modGroupsR?.data  || []).map(mapModGroupFromDb);
  state.modOptions     = (modOptionsR?.data || []).map(mapModOptionFromDb);
  state.itemModGroups  = (itemModsR?.data   || []).map(r => ({ itemId: r.item_id, groupId: r.group_id,
    minSelect: Number(r.min_select) || 0, maxSelect: Math.max(1, Number(r.max_select) || 1),
    defaultOptionId: r.default_option_id || null }));
  state.menuGroups     = (menuGroupsR?.data || []).map(r => ({ id: r.id, name: r.name || '', active: !!r.active }));
  state.itemMenuGroups = (itemMenuGroupsR?.data || []).map(r => ({ itemId: r.item_id, groupId: r.group_id }));
  state.devices        = (devicesR?.data || []).map(r => ({ id: r.id, branchId: r.branch_id, type: r.type || 'cashier_printer',
    name: r.name || '', model: r.model || '', ip: r.ip || '', copies: Number(r.copies) || 1,
    orderTypes: Array.isArray(r.order_types) ? r.order_types : ['pickup','dine_in','delivery','drive_thru'], active: !!r.active }));
  state.deviceCategories = (deviceCatsR?.data || []).map(r => ({ deviceId: r.device_id, categoryId: r.category_id }));
}
async function loadOrderDetail(orderId) {
  if (state.orderDetailCache[orderId]) return state.orderDetailCache[orderId];
  const [itemsR, paysR] = await Promise.all([
    sb.from('order_items').select('*').eq('order_id', orderId),
    sb.from('order_payments').select('*').eq('order_id', orderId),
  ]);
  const detail = { items: (itemsR.data || []).map(mapOrderItemFromDb), payments: (paysR.data || []).map(mapPaymentFromDb) };
  state.orderDetailCache[orderId] = detail;
  return detail;
}

/* -------------------- AUTH -------------------- */
async function doLogin() {
  const email = $('#login-email').value.trim();
  const password = $('#login-password').value;
  if (!email || !password) { toast('Email and password required', 'error'); return; }
  const btn = $('#login-submit'); if (btn) btn.disabled = true;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (btn) btn.disabled = false;
  if (error) { toast(error.message || 'Invalid credentials', 'error'); return; }
  await afterAuth(data.user);
}
async function doSignup() {
  const email = $('#su-email').value.trim();
  const password = $('#su-password').value;
  const firstName = $('#su-first').value.trim();
  const lastName = $('#su-last').value.trim();
  if (!email || password.length < 6) { toast('Email and a 6+ character password required', 'error'); return; }
  const { error } = await sb.auth.signUp({ email, password, options: { data: { first_name: firstName, last_name: lastName } } });
  if (error) { toast(error.message, 'error'); return; }
  toast('Account created — you can log in now.', 'success');
  authMode = 'login'; render();
}
async function afterAuth(user) {
  state.session = { userId: user.id, email: user.email, loggedAt: new Date().toISOString() };
  await loadAll();
  location.hash = hasRole('cashier') ? '#/pos' : '#/dashboard';
  render();
}
async function logout() {
  await sb.auth.signOut();
  state = emptyState();
  // Shared-tablet hygiene: reset every module-level transient var.
  posCart = []; posCategoryId = null; posOrderType = 'pickup'; posDiscount = null;
  posOrderNote = ''; posSearchQ = '';
  _checkoutSplit = null; _itemPhoto = undefined; authMode = 'login';
  location.hash = '';
  render();
}

/* -------------------- ROUTING / SHELL -------------------- */
const routes = ['dashboard', 'pos', 'orders', 'menu', 'item', 'branches', 'staff', 'devices', 'display', 'settings'];
let authMode = 'login';
function getRoute() {
  const h = (location.hash || '').replace(/^#\/?/, '').split('/')[0];
  return routes.includes(h) ? h : (hasRole('cashier') ? 'pos' : 'dashboard');
}
function getRouteArg() {
  return (location.hash || '').replace(/^#\/?/, '').split('/')[1] || '';
}
window.addEventListener('hashchange', () => render());

function navItems() {
  return [
    { key:'dashboard', label:'Dashboard', show: hasRole('admin','manager') },
    { key:'pos',       label:'POS',       show: true },
    { key:'orders',    label:'Orders',    show: true },
    { key:'menu',      label:'Menu',      show: hasRole('admin','manager') },
    { key:'branches',  label:'Branches',  show: isAdmin() },
    { key:'staff',     label:'Staff',     show: isAdmin() },
    { key:'settings',  label:'Settings',  show: isAdmin() },
  ].filter(n => n.show);
}

function render() {
  try { renderMain(); }
  catch (e) {
    console.error('Render error:', e);
    $('#app').innerHTML = `<div class="min-h-screen flex items-center justify-center p-6"><div class="bg-white rounded-2xl shadow-card p-8 max-w-md text-center">
      <h2 class="font-display text-xl font-semibold text-slate-900">Something went wrong</h2>
      <p class="text-sm text-slate-500 mt-2">${escapeHTML(e.message)}</p>
      <button onclick="location.hash=''; render();" class="btn btn-primary mt-4">Back to safety</button></div></div>`;
  }
}
function renderMain() {
  const app = $('#app');
  if (!sb) { app.innerHTML = `<div class="min-h-screen flex items-center justify-center p-6"><div class="bg-white rounded-2xl shadow-card p-8 max-w-md text-center"><h2 class="font-display text-xl font-semibold text-slate-900">Not configured yet</h2><p class="text-sm text-slate-500 mt-2">Set SUPABASE_URL and SUPABASE_KEY in index.html to this project's Supabase credentials (or the CDN failed to load — check the network).</p></div></div>`; return; }
  if (!state.session) { app.innerHTML = renderLogin(); return; }
  const me = currentStaff();
  if (!me || !me.active) { app.innerHTML = renderNoAccessGate(); return; }
  // Customer display: full-screen kiosk page, no shell/nav.
  if (getRoute() === 'display') {
    app.innerHTML = renderCustomerDisplay();
    initDisplaySubscription();
    return;
  }
  const route = getRoute();
  let content = '';
  switch (route) {
    case 'pos':       content = renderPos(); break;
    case 'orders':    content = renderOrders(); break;
    case 'dashboard': content = hasRole('admin','manager') ? renderDashboard() : renderPos(); break;
    case 'menu':      content = hasRole('admin','manager') ? renderMenu() : renderPos(); break;
    case 'item':      content = hasRole('admin','manager') ? renderItemProfile(getRouteArg()) : renderPos(); break;
    case 'branches':  content = isAdmin() ? renderBranches() : renderPos(); break;
    case 'devices':   content = renderDevices(); break; // POS-side page: cashiers view their branch, managers edit
    case 'staff':     content = isAdmin() ? renderStaff() : renderPos(); break;
    case 'settings':  content = isAdmin() ? renderSettings() : renderPos(); break;
    default:          content = renderPos();
  }
  app.innerHTML = renderShell(content, route);
}

function renderShell(content, route) {
  const me = currentStaff();
  const nav = navItems().map(n => `
    <a href="#/${n.key}" class="px-3 py-2 rounded-xl text-sm font-semibold ${getRoute()===n.key ? 'bg-brand-700 text-white' : 'text-slate-600 hover:bg-brand-100'}">${escapeHTML(n.label)}</a>`).join('');
  return `
    <div class="min-h-screen flex flex-col">
      <header class="bg-white border-b border-brand-100 px-4 py-2.5 flex items-center gap-3 flex-wrap">
        <div class="font-display text-lg font-bold text-brand-800">Hassad <span class="text-brand-500">POS</span></div>
        <nav class="flex gap-1 flex-wrap">${nav}</nav>
        <div class="ms-auto flex items-center gap-3 text-sm text-slate-500">
          <span>${escapeHTML(me.firstName || me.email)}${me.branchId ? ` · ${escapeHTML(branchName(me.branchId))}` : ''} <span class="badge badge-slate">${escapeHTML(me.role)}</span></span>
          <button onclick="logout()" class="btn btn-ghost !py-1.5">Logout</button>
        </div>
      </header>
      <main class="flex-1 p-4 md:p-6 max-w-7xl w-full mx-auto">${content}</main>
    </div>`;
}

function renderLogin() {
  const isSignup = authMode === 'signup';
  return `
    <div class="min-h-screen flex items-center justify-center p-6">

let modalOnSave = null;

  closeModal();

  const root = document.createElement('div');
  root.id = 'modal-root';
  root.innerHTML = `
    <div class="modal-box">
      <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">

      </div>

  root.addEventListener('click', e => { if (e.target === root) closeModal(); });

function closeModal() {

  modalOnSave = null;

}

let posCart = [];        // [{itemId, nameEn, nameAr, unitPrice, qty}]
let posCategoryId = null;
let posOrderType = 'pickup';
let posDiscount = null;  // { amount, reason } — final SAR amount off the gross
let posOrderNote = '';
let posSearchQ = '';
let _checkoutSplit = null;
let _posSearchTimer = null;
function setPosSearch(v) {
  posSearchQ = v;
  clearTimeout(_posSearchTimer);
  _posSearchTimer = setTimeout(() => {
    render();
    const inp = document.getElementById('pos-q');
    if (inp) { inp.focus(); const val = inp.value; inp.setSelectionRange(val.length, val.length); }
  }, 150);

function posBranchId() {
  // Cashiers sell at their branch; admin/manager picks (defaults to first).
  return myBranchId() || state.branches.find(b => b.active)?.id || null;
}
function itemAvailableAt(itemId, branchId) {
  return !state.branchOff.some(o => o.itemId === itemId && o.branchId === branchId);
}
function cartTotals() {
  const gross = posCart.reduce((s, l) => s + l.unitPrice * l.qty, 0);
  // Discount comes off the VAT-inclusive gross; VAT is then derived from
  // what the customer actually pays (KSA VAT is owed on the discounted
  // consideration, not the shelf price).
  const discount = Math.min(posDiscount?.amount || 0, gross);
  const total = gross - discount;
  const vat = vatPortion(total, state.settings.vatRate);
  return { gross, discount, total, vat, subtotal: total - vat };
}
// Active modifier groups assigned to an item, carrying the per-assignment
// min/max (Foodics semantics: min>=1 = required, max>1 = multi-select).
function itemModifierGroups(itemId) {
  const assigns = state.itemModGroups.filter(x => x.itemId === itemId);
  return assigns
    .map(a => {
      const g = state.modGroups.find(x => x.id === a.groupId && x.active);
      if (!g) return null;
      return { ...g, minSelect: a.minSelect ?? (g.required ? 1 : 0), maxSelect: a.maxSelect || 1,
        defaultOptionId: a.defaultOptionId || null,
        options: state.modOptions.filter(o => o.groupId === g.id && o.active).sort((x,y) => x.sortOrder - y.sortOrder) };
    })
    .filter(g => g && g.options.length)
    .sort((a,b) => a.sortOrder - b.sortOrder);
}
function pushCartLine(it, mods) {
  const key = it.id + '|' + mods.map(m => m.id).sort().join(',');
  const line = posCart.find(l => l.key === key);
  if (line) line.qty += 1;
  else posCart.push({ key, itemId: it.id, nameEn: it.nameEn, nameAr: it.nameAr,
    unitPrice: it.price + mods.reduce((s, m) => s + m.priceDelta, 0),
    modifiers: mods.map(m => ({ id: m.id, nameEn: m.nameEn, nameAr: m.nameAr, priceDelta: m.priceDelta })),
    qty: 1 });
  render();
}
let _pickerSel = null; // { groupId: option | null } — reset in closeModal
function addToCart(itemId) {
  const it = state.items.find(i => i.id === itemId); if (!it) return;
  const groups = itemModifierGroups(itemId);
  if (!groups.length) { pushCartLine(it, []); return; }
  const body = groups.map(g => `
    <div class="mb-4">
      <div class="text-[11px] uppercase tracking-wider text-slate-500 font-semibold mb-1.5">
        ${escapeHTML(g.nameEn)}${g.nameAr ? ` <span dir="rtl">${escapeHTML(g.nameAr)}</span>` : ''}
        ${g.minSelect >= 1 ? '<span class="text-rose-500">*</span>' : ''}
        ${g.maxSelect > 1 ? `<span class="text-slate-400 normal-case">(up to ${g.maxSelect})</span>` : ''}
      </div>
      <div class="flex gap-1.5 flex-wrap" id="pick-${g.id}">
        ${g.options.map(o => {
          const isDefault = g.defaultOptionId === o.id;
          return `
          <button type="button" onclick="pickOption('${g.id}','${o.id}',${g.maxSelect})" id="opt-${o.id}"
            class="px-3 py-2 rounded-xl text-sm font-semibold border ${isDefault ? 'bg-brand-700 text-white border-brand-700' : 'bg-white text-slate-600 border-slate-200'}">
            ${escapeHTML(o.nameEn)}${o.nameAr ? ` <span dir="rtl" class="text-xs">${escapeHTML(o.nameAr)}</span>` : ''}${o.priceDelta ? ` <span class="${isDefault ? 'text-brand-100' : 'text-brand-700'}">+${fmtMoney(o.priceDelta)}</span>` : ''}
          </button>`;
        }).join('')}
      </div>
    </div>`).join('');
  openModal(it.nameEn + (it.nameAr ? ' — ' + it.nameAr : ''), body, async () => {
    for (const g of groups) {
      const n = (_pickerSel?.[g.id] || []).length;
      if (n < g.minSelect) { toast(`Choose ${g.minSelect > 1 ? 'at least ' + g.minSelect + ' — ' : ''}${g.nameEn}`, 'error'); return false; }
    }
    const mods = groups.flatMap(g => _pickerSel?.[g.id] || []);
    pushCartLine(it, mods);
    return true;
  }, { saveLabel: 'Add to order' });
  // AFTER openModal — its internal closeModal() wipes _pickerSel, so
  // initializing it earlier leaves taps writing into null. Defaults
  // (e.g. Flat White -> LOW FAT milk) start pre-selected.
  _pickerSel = {};
  groups.forEach(g => {
    const d = g.defaultOptionId && g.options.find(o => o.id === g.defaultOptionId);
    if (d) _pickerSel[g.id] = [d];
  });
}
function pickOption(groupId, optionId, maxSelect = 1) {
  if (!_pickerSel) _pickerSel = {};
  const opt = state.modOptions.find(o => o.id === optionId);
  const sel = _pickerSel[groupId] || [];
  if (sel.some(o => o.id === optionId)) {
    _pickerSel[groupId] = sel.filter(o => o.id !== optionId);          // tap again = unpick
  } else if (maxSelect <= 1) {
    _pickerSel[groupId] = [opt];                                       // radio behavior
  } else if (sel.length < maxSelect) {
    _pickerSel[groupId] = [...sel, opt];                               // multi up to the cap
  } else {
    toast(`Up to ${maxSelect} for this group`, 'error'); return;
  }
  document.querySelectorAll(`#pick-${CSS.escape(groupId)} button`).forEach(b => {
    const on = (_pickerSel[groupId] || []).some(o => 'opt-' + o.id === b.id);
    b.className = `px-3 py-2 rounded-xl text-sm font-semibold border ${on ? 'bg-brand-700 text-white border-brand-700' : 'bg-white text-slate-600 border-slate-200'}`;
  });
}
function cartQty(idx, delta) {
  const line = posCart[idx]; if (!line) return;
  line.qty += delta;
  if (line.qty <= 0) posCart.splice(idx, 1);
  render();
}
function clearCart() { posCart = []; posDiscount = null; posOrderType = 'pickup'; posOrderNote = ''; render(); }

/* -------------------- CUSTOMER DISPLAY (Realtime broadcast) -------------------- */
// The till broadcasts its cart to `display-<branchId>`; the /display page
// (a second screen at the counter) subscribes and mirrors it live. No DB
// rows involved — pure Supabase Realtime broadcast.
let _dispCh = null, _dispChBranch = null, _dispLastPayload = '';
function displayChannel(branchId) {
  if (_dispCh && _dispChBranch === branchId) return _dispCh;
  if (_dispCh) sb.removeChannel(_dispCh);
  _dispChBranch = branchId;
  _dispCh = sb.channel('display-' + branchId);
  _dispCh.subscribe();
  return _dispCh;
}
function broadcastCart() {
  const branchId = posBranchId();
  if (!branchId || !openShiftFor(branchId)) return;
  const t = cartTotals();
  const payload = {
    lines: posCart.map(l => ({ qty: l.qty, nameEn: l.nameEn, nameAr: l.nameAr,
      mods: (l.modifiers || []).map(m => ({ nameEn: m.nameEn, nameAr: m.nameAr })),
      lineTotal: +(l.unitPrice * l.qty).toFixed(2) })),
    gross: +t.gross.toFixed(2), discount: +t.discount.toFixed(2),
    vat: +t.vat.toFixed(2), total: +t.total.toFixed(2),
    orderType: posOrderType, ts: Date.now(),
  };
  const key = JSON.stringify({ ...payload, ts: 0 });
  if (key === _dispLastPayload) return; // only send real changes
  _dispLastPayload = key;
  displayChannel(branchId).send({ type: 'broadcast', event: 'cart', payload });
}
function broadcastPaid(order) {
  const ch = displayChannel(order.branchId);
  ch.send({ type: 'broadcast', event: 'paid', payload: { orderNo: order.orderNo, total: order.total, ts: Date.now() } });
  _dispLastPayload = '';
}

// ---- The /display page's own client state ----
let _displayMode = 'idle';   // 'idle' | 'cart' | 'paid'
let _displayCart = null, _displayPaid = null, _displaySubscribed = false, _displayPaidTimer = null;
function initDisplaySubscription() {
  if (_displaySubscribed) return;
  const branchId = myBranchId() || state.branches.find(b => b.active)?.id;
  if (!branchId) return;
  _displaySubscribed = true;
  sb.channel('display-' + branchId)
    .on('broadcast', { event: 'cart' }, ({ payload }) => {
      _displayCart = payload;
      _displayMode = payload.lines?.length ? 'cart' : 'idle';
      if (_displayMode === 'cart') { clearTimeout(_displayPaidTimer); }
      if (getRoute() === 'display') render();
    })
    .on('broadcast', { event: 'paid' }, ({ payload }) => {
      _displayPaid = payload;
      _displayMode = 'paid';
      if (getRoute() === 'display') render();
      clearTimeout(_displayPaidTimer);
      _displayPaidTimer = setTimeout(() => {
        _displayMode = 'idle'; _displayCart = null;
        if (getRoute() === 'display') render();
      }, 7000);
    })
    .subscribe();
}
function renderCustomerDisplay() {
  const s = state.settings;
  const brand = `

/* -------------------- TILL / SHIFT -------------------- */
function openShiftFor(branchId) {
  return state.shifts.find(s => s.branchId === branchId && s.status === 'open') || null;
}
// Cash expected in the drawer right now: float + cash payments of this
// shift's orders that are STILL completed (a same-shift return took the
// cash back out, so it nets to zero by exclusion) + drawer movements
// (pay_in adds, pay_out/cash_drop subtract).
function shiftExpectedCash(shift) {
  const orderIds = new Set(state.orders.filter(o => o.shiftId === shift.id && o.status === 'completed').map(o => o.id));
  let cash = 0;
  for (const id of orderIds) {
    const d = state.orderDetailCache[id];
    if (d) { cash += d.payments.filter(p => p.method === 'cash').reduce((s,p) => s + p.amount, 0); }
  }
  const moves = state.shiftMovements.filter(m => m.shiftId === shift.id);
  const movementNet = moves.reduce((s, m) => s + movementDelta(m), 0);
  return { cash, float: shift.openingFloat, movementNet, moves,
           expected: shift.openingFloat + cash + movementNet,
           hasAllDetails: [...orderIds].every(id => state.orderDetailCache[id]) };
}
function openDrawerModal() {
  const shift = openShiftFor(posBranchId());
  if (!shift) return;
  const moves = state.shiftMovements.filter(m => m.shiftId === shift.id);
  openModal('Drawer — ' + branchName(shift.branchId), `
    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-2">
        <button onclick="openMovementModal('pay_in')" class="btn btn-ghost !py-3">Pay In</button>
        <button onclick="openMovementModal('pay_out')" class="btn btn-ghost !py-3">Pay Out</button>
        <button onclick="openMovementModal('cash_drop')" class="btn btn-ghost !py-3">Cash Drop</button>
        <button onclick="doSpotCheck()" class="btn btn-ghost !py-3">Cash Spot Check</button>
      </div>
      ${moves.length ? `
      <div class="border-t border-slate-100 pt-3">
        <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-2">This shift</div>
        <div class="space-y-1.5 text-sm max-h-56 overflow-y-auto">
          ${moves.map(m => `
            <div class="flex justify-between gap-2">
              <span class="text-slate-600">${MOVEMENT_TYPES[m.type] || m.type}${m.reason ? ` — ${escapeHTML(m.reason)}` : ''}${m.notes ? ` <span class="text-[10px] text-slate-400">${escapeHTML(m.notes)}</span>` : ''}</span>
              <span class="font-semibold tabular-nums ${movementDelta(m) < 0 ? 'text-rose-600' : movementDelta(m) > 0 ? 'text-emerald-700' : 'text-slate-400'}">${movementDelta(m) === 0 ? '—' : (movementDelta(m) > 0 ? '+' : '') + fmtMoney(movementDelta(m))}</span>

}
function openMovementModal(type) {

async function doSpotCheck() {
  const shift = openShiftFor(posBranchId());
  if (!shift) return;
  await loadShiftCashDetails(shift);
  const exp = shiftExpectedCash(shift);
  openModal('Cash Spot Check — ' + branchName(shift.branchId), `
    <div class="space-y-3">
      <div class="bg-slate-50 rounded-xl p-3 text-sm flex justify-between"><span class="text-slate-600">Expected in drawer right now</span><span class="font-bold">${fmtMoney(exp.expected)}</span></div>
      <div><label class="label">Counted cash</label>
        <input id="sc-counted" type="number" min="0" step="0.05" class="input !text-lg" oninput="updateOverShort(${exp.expected.toFixed(2)})"></div>
      <div id="till-overshort" class="text-sm font-semibold text-slate-600">Over/short: —</div>
    </div>`, async () => {
    const counted = parseFloat($('#sc-counted').value);
    if (isNaN(counted) || counted < 0) { toast('Count the drawer first', 'error'); return false; }
    const os = counted - exp.expected;
    return saveMovement(shift, 'spot_check', counted, 'Mid-shift count',
      `expected ${exp.expected.toFixed(2)}, ${Math.abs(os) < 0.005 ? 'balanced' : (os > 0 ? 'over +' : 'short −') + Math.abs(os).toFixed(2)}`);
  }, { saveLabel: 'Record check' });
}
async function saveMovement(shift, type, amount, reason, notes) {
  const me = currentStaff();
  const { data, error } = await sb.from('shift_movements').insert({
    shift_id: shift.id, type, amount: +amount.toFixed(2), reason: reason || null,
    notes: notes || null, created_by: me?.id || null,
  }).select().single();
  if (error) { toast(humanizeError(error), 'error'); return false; }
  state.shiftMovements.unshift(mapShiftMovementFromDb(data));
  render(); toast(MOVEMENT_TYPES[type] + ' recorded', 'success');
  return true;
}
async function loadShiftCashDetails(shift) {
  // Pull payment rows for any of this shift's orders not yet cached.
  const ids = state.orders.filter(o => o.shiftId === shift.id && o.status === 'completed' && !state.orderDetailCache[o.id]).map(o => o.id);
  if (!ids.length) return;
  const [itemsR, paysR] = await Promise.all([
    sb.from('order_items').select('*').in('order_id', ids),
    sb.from('order_payments').select('*').in('order_id', ids),
  ]);
  ids.forEach(id => {
    state.orderDetailCache[id] = {
      items: (itemsR.data || []).filter(r => r.order_id === id).map(mapOrderItemFromDb),
      payments: (paysR.data || []).filter(r => r.order_id === id).map(mapPaymentFromDb),
    };
  });
}

function updateOverShort(expected) {

function checkoutSetMethod(m) {
  _checkoutSplit = { method: m };
  ['cash','mada','split','keeta','ninja'].forEach(x => {
    const b = $('#pay-' + x); if (!b) return;
    b.classList.toggle('btn-primary', x === m);
    b.classList.toggle('btn-ghost', x !== m);
  });
  const t = cartTotals();
  const d = $('#pay-detail'); if (!d) return;
  if (m === 'cash') {
    d.innerHTML = `
      <label class="label">Cash received</label>
      <input id="cash-tendered" type="number" min="0" step="0.05" class="input !text-lg" value="${t.total.toFixed(2)}" oninput="updateChange()">
      <div id="cash-change" class="text-sm text-slate-600 mt-2 font-semibold">Change: 0.00</div>`;
  } else if (m === 'mada') {
    d.innerHTML = `<div class="bg-slate-50 rounded-xl p-3 text-sm text-slate-600">Process ${fmtMoney(t.total)} on the mada terminal, then complete the order. Card details never enter the POS.</div>`;
  } else if (m === 'keeta' || m === 'ninja') {
    d.innerHTML = `<div class="bg-slate-50 rounded-xl p-3 text-sm text-slate-600">Settles ${fmtMoney(t.total)} to the ${m === 'keeta' ? 'KEETA' : 'NINJA'} tender — the aggregator pays it out later; no cash enters the drawer.</div>`;
  } else {
    d.innerHTML = `
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">Cash part</label><input id="split-cash" type="number" min="0" step="0.05" class="input" value="0" oninput="updateSplit()"></div>
        <div><label class="label">mada part</label><input id="split-mada" type="number" min="0" step="0.05" class="input" value="${t.total.toFixed(2)}" oninput="updateSplit()"></div>
      </div>
      <div id="split-check" class="text-sm mt-2 font-semibold"></div>`;
    updateSplit();
  }
}
function updateChange() {
  const t = cartTotals();
  const tendered = parseFloat($('#cash-tendered')?.value) || 0;
  const c = $('#cash-change');
  if (c) { const ch = tendered - t.total; c.textContent = 'Change: ' + fmtMoney(Math.max(0, ch)); c.style.color = ch < 0 ? '#b91c1c' : ''; }
}
function updateSplit() {
  const t = cartTotals();
  const cash = parseFloat($('#split-cash')?.value) || 0;
  const mada = parseFloat($('#split-mada')?.value) || 0;
  const el = $('#split-check'); if (!el) return;
  const diff = t.total - cash - mada;
  el.textContent = Math.abs(diff) < 0.005 ? '✓ Adds up' : (diff > 0 ? `${fmtMoney(diff)} short` : `${fmtMoney(-diff)} over`);
  el.style.color = Math.abs(diff) < 0.005 ? '#047857' : '#b91c1c';
}

async function saveOrder() {
  const t = cartTotals();
  const m = _checkoutSplit?.method || 'cash';
  let payments = [];
  if (m === 'cash') {
    const tendered = parseFloat($('#cash-tendered')?.value) || 0;
    if (tendered < t.total - 0.005) { toast('Cash received is less than the total', 'error'); return false; }
    payments = [{ method:'cash', amount: t.total, tendered, change_given: Math.max(0, tendered - t.total) }];
  } else if (m === 'mada' || m === 'keeta' || m === 'ninja') {
    payments = [{ method: m, amount: t.total }];
  } else {
    const cash = parseFloat($('#split-cash')?.value) || 0;
    const mada = parseFloat($('#split-mada')?.value) || 0;
    if (Math.abs(cash + mada - t.total) > 0.005) { toast('Split amounts must add up to the total', 'error'); return false; }
    payments = [];
    if (cash > 0) payments.push({ method:'cash', amount: cash });
    if (mada > 0) payments.push({ method:'mada', amount: mada });
  }
  const branchId = posBranchId();
  const me = currentStaff();
  const shift = openShiftFor(branchId);
  if (!shift) { toast('The till is closed — open it first', 'error'); return false; }
  const orderRow = { branch_id: branchId, business_date: todayISO(), status: 'completed',
    subtotal: +t.subtotal.toFixed(2), vat_amount: +t.vat.toFixed(2), total: +t.total.toFixed(2), cashier_id: me?.id || null,
    order_type: posOrderType, discount_amount: +t.discount.toFixed(2),
    discount_reason: t.discount > 0 ? (posDiscount?.reason || null) : null,
    shift_id: shift.id, note: posOrderNote || null,
    terminal: localStorage.getItem('posTerminal') || null };

  // Insert; the DB trigger assigns order_no. Concurrent cashiers on one
  // branch can collide on the unique (branch, date, no) — retry once.
  let order = null;
  for (let attempt = 0; attempt < 2 && !order; attempt++) {
    const { data, error } = await sb.from('orders').insert(orderRow).select().single();
    if (error) {
      if (error.code === '23505' && attempt === 0) continue;
      toast(humanizeError(error), 'error'); return false;
    }
    order = data;
  }
  if (!order) { toast('Could not save the order — try again', 'error'); return false; }

  const lineRows = posCart.map(l => ({ order_id: order.id, item_id: l.itemId, name_en: l.nameEn, name_ar: l.nameAr,
    unit_price: +l.unitPrice.toFixed(2), qty: l.qty, line_total: +(l.unitPrice * l.qty).toFixed(2),
    modifiers: l.modifiers?.length ? l.modifiers : null }));
  const { error: liErr } = await sb.from('order_items').insert(lineRows);
  if (liErr) { await sb.from('orders').delete().eq('id', order.id); toast(humanizeError(liErr), 'error'); return false; }
  const { error: payErr } = await sb.from('order_payments').insert(payments.map(p => ({ ...p, order_id: order.id })));
  if (payErr) { toast('Order saved but payment record failed: ' + humanizeError(payErr), 'error'); }

  const mapped = mapOrderFromDb(order);
  state.orders.unshift(mapped);
  state.orderDetailCache[order.id] = { items: lineRows.map(mapOrderItemFromDb), payments: payments.map((p,i) => mapPaymentFromDb({ ...p, id:'tmp'+i, order_id: order.id })) };
  posCart = []; posDiscount = null; posOrderType = 'pickup'; posOrderNote = '';
  render();
  toast(`Order #${mapped.orderNo} completed`, 'success');
  broadcastPaid(mapped); // thank-you screen on the customer display
  printReceipt(mapped.id, 'both'); // customer receipt + bar ticket, in order
  return true;
}

async function voidOrder(orderId) {
  const reason = prompt('Void reason (required) — use Void for mistakes caught before handover; use Return if the customer paid and got money back:');
  if (!reason?.trim()) return;
  const { error } = await sb.from('orders').update({ status:'void', void_reason: reason.trim() }).eq('id', orderId);
  if (error) { toast(humanizeError(error), 'error'); return; }
  const o = state.orders.find(x => x.id === orderId);
  if (o) { o.status = 'void'; o.voidReason = reason.trim(); }
  render(); toast('Order voided', 'success');
}
async function returnOrder(orderId) {
  const o = state.orders.find(x => x.id === orderId);
  if (!o) return;
  const reason = prompt(`Return order #${o.orderNo} (${fmtMoney(o.total)} ${state.settings.currency}) — reason (required):`);
  if (!reason?.trim()) return;
  const me = currentStaff();
  const { error } = await sb.from('orders').update({
    status: 'returned', void_reason: reason.trim(),
    returned_at: new Date().toISOString(), returned_by: me?.id || null,
  }).eq('id', orderId);
  if (error) { toast(humanizeError(error), 'error'); return; }
  o.status = 'returned'; o.voidReason = reason.trim(); o.returnedAt = new Date().toISOString();
  render(); toast(`Order #${o.orderNo} returned — refund ${fmtMoney(o.total)} to the customer`, 'success');
}

/* -------------------- RECEIPT + ZATCA QR -------------------- */
// ZATCA Phase-1 simplified invoice QR: TLV tags 1-5 (seller legal name,
// VAT number, ISO timestamp, total incl VAT, VAT amount), base64, QR.
// Ported from the HR app's B2B invoice module. Returns '' if the QR
// lib failed to load — the receipt prints without a QR, never crashes.
function zatcaQrDataUrl(order) {
  if (typeof qrcode === 'undefined') return '';
  try {
    const enc = new TextEncoder();
    const tlv = (tag, str) => { const b = enc.encode(String(str)); return [tag, b.length, ...b]; };
    const bytes = [
      ...tlv(1, state.settings.companyName),
      ...tlv(2, state.settings.vatNumber),
      ...tlv(3, new Date(order.createdAt).toISOString()),
      ...tlv(4, Number(order.total).toFixed(2)),
      ...tlv(5, Number(order.vatAmount).toFixed(2)),
    ];
    const b64 = btoa(String.fromCharCode.apply(null, bytes));
    const qr = qrcode(0, 'M');
    qr.addData(b64); qr.make();
    return qr.createDataURL(4, 8);
  } catch (e) { console.error('ZATCA QR failed:', e); return ''; }
}
// Blob-URL popup — document.write into about:blank saves BLANK PDFs in
// Safari (HR app PR #156 lesson).
function openPrintWindow(html) {
  const url = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
  const w = window.open(url, '_blank');
  if (!w) toast('Popup blocked — allow popups to print receipts', 'error');
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}
// mode: 'customer' (ZATCA receipt), 'bar' (kitchen/bar ticket, no prices),
// or 'both' — one print job, customer copy then a page-break (= cut on
// thermal roll printers) then the bar ticket. Their branch has ONE
// printer serving both roles, so one job is the right default at checkout.
async function printReceipt(orderId, mode = 'customer') {
  const order = state.orders.find(o => o.id === orderId);
  if (!order) return;
  const detail = await loadOrderDetail(orderId);
  const s = state.settings;
  const qrUrl = zatcaQrDataUrl(order);
  const payLabel = { cash:'Cash', mada:'mada', card:'Card', stc_pay:'STC Pay', keeta:'KEETA', ninja:'NINJA', koinz:'Koinz', other:'Other' };
  const customerBody = `
    <div class="c b" style="font-size:14px">${escapeHTML(s.companyName)}</div>
    ${s.companyNameAr ? `<div class="c ar">${escapeHTML(s.companyNameAr)}</div>` : ''}
    ${s.vatNumber ? `<div class="c">VAT: ${escapeHTML(s.vatNumber)}</div>` : ''}
    ${s.crNumber ? `<div class="c">C.R.: ${escapeHTML(s.crNumber)}</div>` : ''}
    <div class="c">${escapeHTML(branchName(order.branchId))}</div>
    <hr>
    <div class="row"><span>Simplified Tax Invoice</span><span class="ar">فاتورة ضريبية مبسطة</span></div>
    <div class="row"><span class="b">Order #${order.orderNo}</span><span>${fmtDateTime(order.createdAt)}</span></div>
    <div class="row"><span>${ORDER_TYPES[order.orderType] || 'Pickup'}</span><span>${escapeHTML(staffName(order.cashierId))}</span></div>
    ${order.note ? `<div class="b" style="margin-top:2px">📝 ${escapeHTML(order.note)}</div>` : ''}
    ${order.status === 'void' ? '<div class="c b" style="font-size:13px">*** VOID ***</div>' : ''}
    ${order.status === 'returned' ? '<div class="c b" style="font-size:13px">*** RETURNED / مرتجع ***</div>' : ''}
    <hr>
    <table>${detail.items.map(l => `
      <tr><td>${l.qty}× ${escapeHTML(l.nameEn)}${l.nameAr ? ` <span class="ar">${escapeHTML(l.nameAr)}</span>` : ''}</td>
      <td style="text-align:end">${fmtMoney(l.lineTotal)}</td></tr>
      ${(l.modifiers || []).map(m => `<tr><td style="padding-inline-start:10px">+ ${escapeHTML(m.nameEn)}${m.nameAr ? ` <span class="ar">${escapeHTML(m.nameAr)}</span>` : ''}</td><td style="text-align:end">${m.priceDelta ? '+' + fmtMoney(m.priceDelta * l.qty) : ''}</td></tr>`).join('')}`).join('')}
    </table>
    <hr>
    ${order.discountAmount > 0 ? `
    <div class="row"><span>Items / الأصناف</span><span>${fmtMoney(order.total + order.discountAmount)}</span></div>
    <div class="row"><span>Discount / الخصم</span><span>-${fmtMoney(order.discountAmount)}</span></div>` : ''}
    <div class="row"><span>Subtotal (ex-VAT) / المجموع</span><span>${fmtMoney(order.subtotal)}</span></div>
    <div class="row"><span>VAT ${s.vatRate}% / الضريبة</span><span>${fmtMoney(order.vatAmount)}</span></div>
    <div class="row b" style="font-size:13px"><span>TOTAL / الإجمالي</span><span>${fmtMoney(order.total)} ${escapeHTML(s.currency)}</span></div>
    <hr>
    ${detail.payments.map(p => `<div class="row"><span>${payLabel[p.method] || p.method}</span><span>${fmtMoney(p.amount)}</span></div>
      ${p.method==='cash' && p.tendered != null ? `<div class="row"><span>Tendered / Change</span><span>${fmtMoney(p.tendered)} / ${fmtMoney(p.changeGiven || 0)}</span></div>` : ''}`).join('')}
    ${qrUrl ? `<img class="qr" src="${qrUrl}" alt="ZATCA QR">` : ''}
    ${s.receiptFooterEn ? `<div class="c">${escapeHTML(s.receiptFooterEn)}</div>` : ''}
    ${s.receiptFooterAr ? `<div class="c ar">${escapeHTML(s.receiptFooterAr)}</div>` : ''}`;

  // Kitchen routing (Foodics semantics): the branch's kitchen printer
  // decides what prints — its category filter drops items (their setup
  // keeps COMPENSATION and EMPLOYEE COFFEE off, so staff drinks print
  // no ticket) and its enabled order types can veto the whole job. No
  // kitchen device configured = print everything (small-kiosk default).
  const kd = kitchenDeviceFor(order.branchId);
  let barItems = detail.items;
  let barEnabled = true;
  if (kd) {
    if (!kd.orderTypes.includes(order.orderType)) barEnabled = false;
    const catSet = deviceCategorySet(kd.id);
    if (catSet) {
      barItems = detail.items.filter(l => {
        const item = state.items.find(i => i.id === l.itemId);
        return !item || catSet.has(item.categoryId); // deleted items: keep, better safe
      });
      if (!barItems.length) barEnabled = false;
    }
  }
  if (mode === 'both' && !barEnabled) mode = 'customer';
  if (mode === 'bar' && !barEnabled) { toast('Nothing on this order prints to the kitchen (see Devices routing)', 'info'); return; }

  // Bar/kitchen ticket: a SHORT stub — one header line, items with the
  // Arabic inline and all modifiers bundled on one compact line each.
  // No prices, no VAT, no QR, no footer; paper stays short.
  const barBody = `
    <div class="row b" style="font-size:16px; align-items:baseline">
      <span>#${order.orderNo} · ${ORDER_TYPES[order.orderType] || 'Pickup'}</span>
      <span style="font-size:10px; font-weight:400">${fmtDateTime(order.createdAt)}</span>
    </div>
    ${order.status !== 'completed' ? `<div class="c b" style="font-size:12px">*** ${order.status.toUpperCase()} ***</div>` : ''}
    ${order.note ? `<div class="b" style="border:1.5px solid #000; padding:1.5mm; margin:1.5mm 0; font-size:11px">📝 ${escapeHTML(order.note)}</div>` : ''}

      <div style="margin:1.5mm 0">

        ${(l.modifiers || []).length ? `<div class="b" style="font-size:11px; padding-inline-start:5mm">${(l.modifiers || []).map(m => `▸ ${escapeHTML(m.nameEn)}`).join('  ')}</div>` : ''}
      </div>`).join('')}`;

  // Two SEPARATE print jobs, in order (Foodics rhythm: the customer copy
  // prints first and is handed over, the bar ticket follows). One popup;
  // window.print() blocks until the dialog closes, so we swap tickets
  // between the two calls. On a kiosk browser with silent printing both
  // jobs fire instantly as two cut tickets.
  const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Order #${order.orderNo}</title><style>
    @page { size: 80mm auto; margin: 3mm; }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; width: 72mm; margin: 0 auto; font-size: 11px; color: #000; }
    .c { text-align: center; } .b { font-weight: 700; }
    .row { display: flex; justify-content: space-between; gap: 6px; }
    hr { border: 0; border-top: 1px dashed #000; margin: 6px 0; }
    table { width: 100%; border-collapse: collapse; } td { padding: 1px 0; vertical-align: top; }
    .ar { direction: rtl; font-family: -apple-system, 'Segoe UI', sans-serif; }
    img.qr { width: 30mm; height: 30mm; display:block; margin: 6px auto; }
    .btnbar { position: fixed; top: 0; right: 0; padding: 6px; display: flex; gap: 4px; } @media print { .btnbar { display: none; } }
  </style></head><body>
    <div class="btnbar">
      <button onclick="showTicket('customer'); print();">Print receipt</button>
      <button onclick="showTicket('bar'); print();">Print bar ticket</button>
    </div>
    <div id="t-customer">${customerBody}</div>
    <div id="t-bar" style="display:none">${barBody}</div>
    <script>
      const MODE = ${JSON.stringify(mode)};
      function showTicket(which) {
        document.getElementById('t-customer').style.display = which === 'customer' ? 'block' : 'none';
        document.getElementById('t-bar').style.display = which === 'bar' ? 'block' : 'none';
      }
      window.onload = () => setTimeout(() => {
        if (MODE === 'both') {
          showTicket('customer'); print();   // job 1 — hand to the customer
          showTicket('bar');      print();   // job 2 — goes to the bar
          showTicket('customer');
        } else {
          showTicket(MODE === 'bar' ? 'bar' : 'customer'); print();
        }
      }, 150);
    <\/script>
  </body></html>`;
  openPrintWindow(html);
}

function renderDashboard() {
  const today = todayISO();
  const done = state.orders.filter(o => o.status === 'completed');
  const todayOrders = done.filter(o => o.businessDate === today);
  const returnedToday = state.orders.filter(o => o.status === 'returned' && o.businessDate === today);
  const sum = list => list.reduce((s, o) => s + o.total, 0);
  const discountsToday = todayOrders.reduce((s, o) => s + o.discountAmount, 0);
  const avg = todayOrders.length ? sum(todayOrders) / todayOrders.length : 0;
  const byType = Object.entries(ORDER_TYPES)
    .map(([k, label]) => ({ label, n: todayOrders.filter(o => o.orderType === k).length }))
    .filter(x => x.n > 0);
  const byBranch = state.branches.filter(b => b.active).map(b => {
    const open = state.shifts.find(s => s.branchId === b.id && s.status === 'open');
    const lastClosed = state.shifts.find(s => s.branchId === b.id && s.status === 'closed');
    return {
      name: b.name,
      today: sum(todayOrders.filter(o => o.branchId === b.id)),
      week: sum(done.filter(o => o.branchId === b.id)),
      n: todayOrders.filter(o => o.branchId === b.id).length,
      till: open
        ? `<span class="badge badge-green">Open</span> <span class="text-xs text-slate-500">since ${fmtDateTime(open.openedAt)}</span>`
        : lastClosed
          ? `<span class="badge badge-slate">Closed</span> <span class="text-xs ${Math.abs(lastClosed.overShort) < 0.005 ? 'text-emerald-700' : 'text-rose-600'}">${Math.abs(lastClosed.overShort) < 0.005 ? 'balanced ✓' : (lastClosed.overShort > 0 ? 'over +' : 'short −') + fmtMoney(Math.abs(lastClosed.overShort))}</span>`
          : '<span class="badge badge-slate">Never opened</span>',
    };
  });
  const stat = (label, value, sub) => `
    <div class="bg-white rounded-2xl shadow-card p-4">
      <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">${label}</div>

      ${sub ? `<div class="text-xs text-slate-500 mt-1">${sub}</div>` : ''}
    </div>`;
  return `
    <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-3 mb-5">
      ${stat('Sales today', fmtMoney(sum(todayOrders)) + ' ' + escapeHTML(state.settings.currency), todayOrders.length + ' orders')}
      ${stat('Average ticket', fmtMoney(avg), 'today')}
      ${stat('Returns today', fmtMoney(sum(returnedToday)), returnedToday.length + ' order' + (returnedToday.length===1?'':'s'))}
      ${stat('Discounts today', fmtMoney(discountsToday), 'off completed orders')}
      ${stat('Sales — 7 days', fmtMoney(sum(done)), done.length + ' orders')}
      ${stat('VAT — 7 days', fmtMoney(done.reduce((s,o) => s + o.vatAmount, 0)), 'from completed orders')}
    </div>
    ${byType.length ? `<div class="bg-white rounded-2xl shadow-card px-4 py-3 mb-5 flex items-center gap-3 flex-wrap text-sm">
      <span class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Today by type</span>
      ${byType.map(x => `<span class="badge badge-slate">${x.label} · ${x.n}</span>`).join('')}
    </div>` : ''}
    <div class="bg-white rounded-2xl shadow-card overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-100"><h3 class="font-display text-lg font-semibold text-slate-900">By branch</h3></div>
      <table class="w-full text-sm">
        <thead><tr class="text-[10px] uppercase tracking-wider text-slate-500 bg-slate-50/60 border-b border-slate-100">
          <th class="text-start px-4 py-2.5">Branch</th><th class="text-start px-4 py-2.5">Till</th><th class="text-end px-4 py-2.5">Today</th><th class="text-end px-4 py-2.5">Orders today</th><th class="text-end px-4 py-2.5">7 days</th></tr></thead>
        <tbody class="divide-y divide-slate-100">
          ${byBranch.map(b => `<tr><td class="px-4 py-2.5 font-medium">${escapeHTML(b.name)}</td>
            <td class="px-4 py-2.5">${b.till}</td>
            <td class="px-4 py-2.5 text-end font-semibold">${fmtMoney(b.today)}</td>
            <td class="px-4 py-2.5 text-end">${b.n}</td>
            <td class="px-4 py-2.5 text-end text-slate-600">${fmtMoney(b.week)}</td></tr>`).join('')}

    </div>`;
}

// Pending item-photo upload — reset in closeModal() (shared-tablet hygiene).
let _itemPhoto = undefined; // undefined = untouched, '' = removed, 'data:...' = new photo
function handleItemPhotoFile(input) {
  const file = input.files?.[0];
  if (!file) return;
  if (!['image/jpeg','image/png','image/webp'].includes(file.type)) { toast('JPG, PNG or WebP only', 'error'); input.value=''; return; }
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    // Resize to max 400px and recompress — keeps the row tiny (~20-40KB)
    // so bulk-loading the menu stays cheap (HR-app photo-OOM lesson).
    const scale = Math.min(1, 400 / Math.max(img.width, img.height));
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    _itemPhoto = canvas.toDataURL('image/jpeg', 0.72);
    URL.revokeObjectURL(url);
    const prev = $('#item-photo-preview');
    if (prev) prev.innerHTML = `<img src="${_itemPhoto}" class="w-16 h-16 rounded-xl object-cover">`;
  };
  img.onerror = () => { URL.revokeObjectURL(url); toast('Could not read that image', 'error'); };
  img.src = url;
}
function removeItemPhoto() {
  _itemPhoto = '';
  const prev = $('#item-photo-preview');
  if (prev) prev.innerHTML = '<span class="text-xs text-slate-400">No photo</span>';
}

        <div><label class="label">Name</label><input id="dv-name" class="input" value="${escapeHTML(editing?.name || '')}" placeholder="e.g. Cashier"></div>
        <div><label class="label">Model</label><input id="dv-model" class="input" value="${escapeHTML(editing?.model || '')}" placeholder="e.g. TM-m30II"></div>
      </div>
      <div class="grid grid-cols-3 gap-3">
        <div><label class="label">IP address</label><input id="dv-ip" class="input" value="${escapeHTML(editing?.ip || '')}" placeholder="192.168.0.239"></div>
        <div><label class="label">Copies</label><input id="dv-copies" type="number" min="1" max="3" class="input" value="${editing?.copies || 1}"></div>
        <div><label class="label">Active</label><select id="dv-active" class="input"><option value="1" ${editing?.active !== false ? 'selected' : ''}>Yes</option><option value="0" ${editing?.active === false ? 'selected' : ''}>No</option></select></div>
      </div>
      <div>
        <label class="label">Enabled order types</label>
        <div class="flex gap-3 flex-wrap">
          ${Object.entries(ORDER_TYPES).map(([k, v]) => `
            <label class="flex items-center gap-1.5 text-sm"><input type="checkbox" class="dv-ot" value="${k}" ${(editing ? editing.orderTypes.includes(k) : true) ? 'checked' : ''}> ${v}</label>`).join('')}
        </div>
      </div>
    </div>`, async () => {
    const row = { branch_id: $('#dv-branch').value, type: $('#dv-type').value,
      name: $('#dv-name').value.trim(), model: $('#dv-model').value.trim() || null,
      ip: $('#dv-ip').value.trim() || null,
      copies: Math.min(3, Math.max(1, parseInt($('#dv-copies').value) || 1)),
      active: $('#dv-active').value === '1',
      order_types: [...document.querySelectorAll('.dv-ot:checked')].map(cb => cb.value) };
    if (!row.name) { toast('Name required', 'error'); return false; }
    if (!row.order_types.length) { toast('Enable at least one order type', 'error'); return false; }
    const q = editing ? sb.from('devices').update(row).eq('id', editing.id) : sb.from('devices').insert(row);
    const { error } = await q;
    if (error) { toast(humanizeError(error), 'error'); return false; }
    await loadAll(); render(); toast('Saved', 'success');
  });
}
function openDeviceCategoriesModal(deviceId) {
  const d = state.devices.find(x => x.id === deviceId); if (!d) return;
  const enabled = deviceCategorySet(deviceId); // null = all
  openModal('Kitchen categories — ' + d.name, `
    <div class="space-y-2">
      <div class="text-xs text-slate-500 mb-2">Only items from enabled categories print on this printer's bar tickets. All on = everything prints.</div>
      ${state.categories.filter(c => c.active).sort((a,b) => a.sortOrder - b.sortOrder).map(c => `
        <label class="flex items-center gap-2 text-sm py-0.5"><input type="checkbox" class="dc-cat" value="${c.id}" ${(!enabled || enabled.has(c.id)) ? 'checked' : ''}> ${escapeHTML(c.nameEn)}</label>`).join('')}
    </div>`, async () => {
    const all = state.categories.filter(c => c.active).map(c => c.id);
    const checked = [...document.querySelectorAll('.dc-cat:checked')].map(cb => cb.value);
    if (!checked.length) { toast('Enable at least one category (or delete the printer instead)', 'error'); return false; }
    await sb.from('device_categories').delete().eq('device_id', deviceId);
    // All checked = store nothing (the "all categories" default); a subset
    // stores explicit rows, matching the Foodics toggle semantics.
    if (checked.length < all.length) {
      const { error } = await sb.from('device_categories').insert(checked.map(cid => ({ device_id: deviceId, category_id: cid })));
      if (error) { toast(humanizeError(error), 'error'); return false; }
    }
    await loadAll(); render(); toast('Saved', 'success');
  });
}
async function deleteDevice(id) {
  const d = state.devices.find(x => x.id === id); if (!d) return;
  openModal('Delete device', `<p class="text-sm text-slate-700">Delete <strong>${escapeHTML(d.name)}</strong> (${escapeHTML(branchName(d.branchId))})? Bar-ticket routing for this branch reverts to printing everything.</p>`,
    async () => {
      const { error } = await sb.from('devices').delete().eq('id', id);
      if (error) { toast(humanizeError(error), 'error'); return false; }
      state.devices = state.devices.filter(x => x.id !== id);
      state.deviceCategories = state.deviceCategories.filter(x => x.deviceId !== id);
      render(); toast('Device deleted', 'success');
    }, { saveLabel: 'Delete' });
}

/* -------------------- BRANCHES / STAFF / SETTINGS -------------------- */

      <button onclick="openBranchModal(null)" class="btn btn-primary">+ Branch</button>

    <div class="bg-white rounded-2xl shadow-card divide-y divide-slate-100">

    if (!row.name) { toast('Name required', 'error'); return false; }
    const q = editing ? sb.from('branches').update(row).eq('id', editing.id) : sb.from('branches').insert(row);

    await loadAll(); render(); toast('Saved', 'success');

}
function renderStaff() {
  return `
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-display text-2xl font-semibold text-slate-900">Staff</h2>
      <button onclick="openStaffModal(null)" class="btn btn-primary">+ Staff</button>
    </div>
    <div class="bg-white rounded-2xl shadow-card overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="text-[10px] uppercase tracking-wider text-slate-500 bg-slate-50/60 border-b border-slate-100">
          <th class="text-start px-4 py-2.5">Name</th><th class="text-start px-4 py-2.5">Email</th><th class="text-start px-4 py-2.5">Role</th>
          <th class="text-start px-4 py-2.5">Branch</th><th class="text-start px-4 py-2.5">Login</th><th class="px-4 py-2.5"></th></tr></thead>
        <tbody class="divide-y divide-slate-100">
          ${state.staff.map(s => `
            <tr class="${s.active ? '' : 'opacity-50'}">

              <td class="px-4 py-2.5 text-slate-600">${escapeHTML(s.email)}</td>
              <td class="px-4 py-2.5"><span class="badge badge-slate">${escapeHTML(s.role)}</span></td>
              <td class="px-4 py-2.5">${escapeHTML(s.branchId ? branchName(s.branchId) : '—')}</td>

              <td class="px-4 py-2.5 text-end"><button onclick="openStaffModal('${s.id}')" class="btn btn-ghost !py-1 !px-2.5 !text-xs">Edit</button></td>
            </tr>`).join('')}
        </tbody></table>
    </div>

}
function openStaffModal(id) {
  const editing = id ? state.staff.find(s => s.id === id) : null;
  openModal(editing ? 'Edit staff' : 'New staff', `
    <div class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">First name</label><input id="st-first" class="input" value="${escapeHTML(editing?.firstName || '')}"></div>
        <div><label class="label">Last name</label><input id="st-last" class="input" value="${escapeHTML(editing?.lastName || '')}"></div>
      </div>
      <div><label class="label">Email</label><input id="st-email" type="email" class="input" value="${escapeHTML(editing?.email || '')}" ${editing?.userId ? 'disabled' : ''}></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">Role</label><select id="st-role" class="input">
          ${['admin','manager','cashier'].map(r => `<option value="${r}" ${editing?.role === r ? 'selected':''}>${r}</option>`).join('')}</select></div>
        <div><label class="label">Branch</label><select id="st-branch" class="input">
          <option value="">— None —</option>
          ${state.branches.filter(b => b.active).map(b => `<option value="${b.id}" ${editing?.branchId === b.id ? 'selected':''}>${escapeHTML(b.name)}</option>`).join('')}</select></div>
      </div>
      <div><label class="label">Active</label><select id="st-active" class="input"><option value="1" ${editing?.active !== false ? 'selected':''}>Yes</option><option value="0" ${editing?.active === false ? 'selected':''}>No</option></select></div>
      ${!editing ? '<div class="bg-amber-50 border border-amber-100 rounded-xl p-3 text-xs text-amber-800">Cashiers must have a branch — RLS blocks their orders otherwise.</div>' : ''}
    </div>`, async () => {
    const row = { first_name: $('#st-first').value.trim(), last_name: $('#st-last').value.trim(),
      email: $('#st-email').value.trim().toLowerCase(), role: $('#st-role').value,

    if (!row.email) { toast('Email required', 'error'); return false; }

    const q = editing ? sb.from('staff').update(row).eq('id', editing.id) : sb.from('staff').insert(row);

}

async function saveSettings() {
  const row = { company_name: $('#set-name').value.trim(), company_name_ar: $('#set-name-ar').value.trim(),
    vat_number: $('#set-vat').value.trim(), cr_number: $('#set-cr').value.trim(),
    currency: $('#set-currency').value.trim() || 'SAR', vat_rate: parseFloat($('#set-rate').value) || 15,
    receipt_footer_en: $('#set-footer-en').value.trim(), receipt_footer_ar: $('#set-footer-ar').value.trim(), updated_at: new Date().toISOString() };
  const { error } = await sb.from('pos_settings').update(row).eq('id', state.settingsId);
  if (error) { toast(humanizeError(error), 'error'); return; }
  await loadAll(); render(); toast('Settings saved', 'success');
}

/* -------------------- INIT -------------------- */
async function bootstrap() {
  if (!sb) { render(); return; }
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) {
      state.session = { userId: session.user.id, email: session.user.email, loggedAt: new Date().toISOString() };
      await loadAll();
    }
  } catch (e) { console.error('Bootstrap error:', e); }
  render();
  sb?.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_OUT') { state = emptyState(); posCart = []; location.hash = ''; render(); }
    else if (event === 'SIGNED_IN' && session?.user && !state.session) {
      state.session = { userId: session.user.id, email: session.user.email, loggedAt: new Date().toISOString() };
      await loadAll(); render();
    }
  });
}
bootstrap();
</script>
