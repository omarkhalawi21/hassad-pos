<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; object-src 'none'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net; frame-src 'self' blob:; base-uri 'self'; form-action 'self';" />
<title>Hassad POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo:wght@400;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tailwind.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" integrity="sha384-GFr3yTh5lJznCbZfpTtXnwboFsxqtTQoeTZCRHhE0579KrRmlCzen5AA8ohaB5ug" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js" integrity="sha384-lQXOAyZwHXE55JFyrOMB7nY2Wv+m5ZWNtJcHrd1rceRQXAYNLak8ukN5TjBTcIwz" crossorigin="anonymous"></script>
<style>
  /* Same-specificity overrides load after tailwind.css and win without a rebuild. */
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; padding:.55rem 1.1rem; border-radius:.8rem; font-weight:600; font-size:.875rem; cursor:pointer; border:1px solid transparent; transition:all .12s; }
  .btn-primary { background:#6e4220; color:#fff; } .btn-primary:hover { background:#573419; }
  .btn-ghost { background:#fff; color:#334155; border-color:#e2e8f0; } .btn-ghost:hover { background:#f8fafc; }
  .btn-danger { background:#fff; color:#a93838; border-color:#f1d4d4; } .btn-danger:hover { background:#fdf2f2; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .input { width:100%; padding:.55rem .8rem; border:1px solid #e2e8f0; border-radius:.7rem; font-size:.9rem; background:#fff; }
  .input:focus { outline:2px solid #c9945566; border-color:#c99455; }
  .label { display:block; font-size:.72rem; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:#64748b; margin-bottom:.3rem; }
  .tab { padding:.5rem 1rem; font-size:.875rem; font-weight:600; color:#64748b; border-bottom:2px solid transparent; background:none; cursor:pointer; }
  .tab.active { color:#6e4220; border-bottom-color:#6e4220; }
  .badge { display:inline-block; padding:.15rem .6rem; border-radius:999px; font-size:.72rem; font-weight:600; }
  .badge-green { background:#d1fae5; color:#047857; } .badge-red { background:#fee2e2; color:#b91c1c; }
  .badge-slate { background:#f1f5f9; color:#475569; } .badge-amber { background:#fef3c7; color:#b45309; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); color:#fff; padding:.7rem 1.3rem; border-radius:.8rem; font-size:.875rem; font-weight:500; z-index:9999; box-shadow:0 10px 30px rgba(15,23,42,.25); }
  #modal-root { position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:1000; display:flex; align-items:center; justify-content:center; padding:1rem; }
  .modal-box { background:#fff; border-radius:1.2rem; width:100%; max-width:640px; max-height:92vh; overflow-y:auto; }
  .pos-item { transition:transform .06s; } .pos-item:active { transform:scale(.96); }
</style>
</head>
<body class="bg-brand-50 font-sans text-slate-800">
<div id="app">
  <div class="min-h-screen flex items-center justify-center">
    <div class="text-center">
      <div class="w-14 h-14 rounded-full border-4 border-brand-200 border-t-brand-700 animate-spin mx-auto"></div>
      <div class="mt-4 text-sm text-slate-500 font-display">Loading…</div>
    </div>
  </div>
</div>
<script>
/* ============================================================
   HASSAD POS — single-file app. Conventions ported from the
   Hassad HR app; see CLAUDE.md. RLS is the security boundary —
   every UI gate here is convenience, not protection.
============================================================ */

/* -------------------- CONFIG -------------------- */
// Paste the new Supabase project's URL + publishable key here.
// The publishable key is safe in client source ONLY because RLS
// is enforced on every table (see supabase-pos.sql).
const SUPABASE_URL = 'https://lqfardjkvoyzutsqlfco.supabase.co';
const SUPABASE_KEY = 'sb_publishable_yyu7cVkXy4ZgWXkqimNz4Q_1gPguJ90';
const sb = (() => {
  try {
    if (!/^https:\/\/.+\.supabase\.co$/.test(SUPABASE_URL)) return null; // placeholder → config gate, not a crash
    return window.supabase?.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    }) || null;
  } catch (e) { console.error('Supabase init failed:', e); return null; }
})();

/* -------------------- HELPERS -------------------- */
const $ = sel => document.querySelector(sel);
function escapeHTML(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function toast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.background = type === 'error' ? '#b91c1c' : type === 'success' ? '#047857' : '#0f172a';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.transition = 'opacity .2s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 200); }, 2600);
}
// Missing-DB-object codes mean a skipped migration, not a bug.
function humanizeError(err) {
  const code = err?.code || '';
  if (['PGRST202','42883','42P01','42703'].includes(code)) return 'Database schema is out of date — run the latest supabase-pos.sql in the SQL editor.';
  if (code === '42501') return 'You do not have permission for that.';
  if (code === '23505') return 'That already exists.';
  return err?.message || 'Something went wrong.';
}
function todayISO() { return new Date().toISOString().slice(0, 10); }
function fmtMoney(n) { return Number(n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtDateTime(ts) { return ts ? new Date(ts).toLocaleString(undefined, { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '—'; }
// VAT-inclusive price → contained VAT portion.
function vatPortion(totalInc, rate) { return totalInc * rate / (100 + rate); }

/* -------------------- STATE + MAPPERS -------------------- */
function emptyState() {
  return {
    session: null,
    settings: { companyName:'Hassad Coffee Roasters', companyNameAr:'', vatNumber:'', crNumber:'', currency:'SAR', vatRate:15, receiptFooterEn:'', receiptFooterAr:'' },
    settingsId: null,
    branches: [], staff: [], categories: [], items: [], branchOff: [],
    orders: [],           // capped recent window (today + last 7 days)
    shifts: [],           // open shifts + last 7 days of closed ones
    orderDetailCache: {}, // orderId → { items:[], payments:[] } fetched on demand for receipts
  };
}
let state = emptyState();

function mapSettingsFromDb(r) {
  return { _id: r.id, companyName: r.company_name || '', companyNameAr: r.company_name_ar || '',
    vatNumber: r.vat_number || '', crNumber: r.cr_number || '', currency: r.currency || 'SAR',
    vatRate: Number(r.vat_rate) || 15, receiptFooterEn: r.receipt_footer_en || '', receiptFooterAr: r.receipt_footer_ar || '' };
}
function mapBranchFromDb(r) { return { id: r.id, name: r.name || '', nameAr: r.name_ar || '', active: !!r.active }; }
function mapStaffFromDb(r) {
  return { id: r.id, userId: r.user_id, email: r.email || '', firstName: r.first_name || '', lastName: r.last_name || '',
    role: r.role || 'cashier', branchId: r.branch_id, active: !!r.active };
}
function mapCategoryFromDb(r) { return { id: r.id, nameEn: r.name_en || '', nameAr: r.name_ar || '', reference: r.reference || '', sortOrder: Number(r.sort_order) || 0, active: !!r.active }; }
function mapItemFromDb(r) {
  return { id: r.id, categoryId: r.category_id, nameEn: r.name_en || '', nameAr: r.name_ar || '',
    price: Number(r.price) || 0, sku: r.sku || '', photo: r.photo || '', sortOrder: Number(r.sort_order) || 0, active: !!r.active };
}
function mapShiftFromDb(r) {
  return { id: r.id, branchId: r.branch_id, businessDate: r.business_date, status: r.status || 'open',
    openingFloat: Number(r.opening_float) || 0, openedBy: r.opened_by, openedAt: r.opened_at,
    closedBy: r.closed_by, closedAt: r.closed_at,
    expectedCash: r.expected_cash == null ? null : Number(r.expected_cash),
    countedCash: r.counted_cash == null ? null : Number(r.counted_cash),
    overShort: r.over_short == null ? null : Number(r.over_short), notes: r.notes || '' };
}
// Small resized product photos only; validated before every <img> injection.
const PHOTO_DATA_URL_RE = /^data:image\/(png|jpe?g|webp);base64,[A-Za-z0-9+/=]+$/;
function safePhoto(p) { return p && PHOTO_DATA_URL_RE.test(p) ? p : ''; }
function mapOrderFromDb(r) {
  return { id: r.id, branchId: r.branch_id, businessDate: r.business_date, orderNo: Number(r.order_no) || 0,
    status: r.status || 'completed', subtotal: Number(r.subtotal) || 0, vatAmount: Number(r.vat_amount) || 0,
    total: Number(r.total) || 0, cashierId: r.cashier_id, voidReason: r.void_reason || '', createdAt: r.created_at,
    orderType: r.order_type || 'pickup', discountAmount: Number(r.discount_amount) || 0,
    discountReason: r.discount_reason || '', returnedAt: r.returned_at, returnedBy: r.returned_by,
    shiftId: r.shift_id || null };
}
const ORDER_TYPES = { pickup: 'Pickup', dine_in: 'Dine-in', delivery: 'Delivery', drive_thru: 'Drive-thru' };
function mapOrderItemFromDb(r) {
  return { id: r.id, orderId: r.order_id, itemId: r.item_id, nameEn: r.name_en || '', nameAr: r.name_ar || '',
    unitPrice: Number(r.unit_price) || 0, qty: Number(r.qty) || 0, lineTotal: Number(r.line_total) || 0 };
}
function mapPaymentFromDb(r) {
  return { id: r.id, orderId: r.order_id, method: r.method || 'cash', amount: Number(r.amount) || 0,
    tendered: r.tendered == null ? null : Number(r.tendered), changeGiven: r.change_given == null ? null : Number(r.change_given) };
}

/* -------------------- ROLES -------------------- */
function currentStaff() {
  if (!state.session) return null;
  return state.staff.find(s => s.userId === state.session.userId) || null;
}
function currentRole() { return currentStaff()?.role || 'none'; }
function hasRole(...roles) { return roles.includes(currentRole()); }
function isAdmin() { return currentRole() === 'admin'; }
function myBranchId() { return currentStaff()?.branchId || null; }
function branchName(id) { return state.branches.find(b => b.id === id)?.name || '—'; }
function staffName(id) { const s = state.staff.find(x => x.id === id); return s ? `${s.firstName} ${s.lastName}`.trim() || s.email : '—'; }

/* -------------------- DATA LOAD -------------------- */
async function loadAll() {
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
  const [settingsR, branchesR, staffR, categoriesR, itemsR, offR, ordersR, shiftsR] = await Promise.all([
    sb.from('pos_settings').select('*').limit(1).maybeSingle(),
    sb.from('branches').select('*').order('name'),
    sb.from('staff').select('*').order('first_name'),
    sb.from('menu_categories').select('*').order('sort_order'),
    sb.from('menu_items').select('*').order('sort_order'),
    sb.from('menu_item_branch_off').select('*'),
    // Recent window only — orders grow forever; history beyond this
    // stays in the DB (reports can query on demand later).
    sb.from('orders').select('*').gte('business_date', weekAgo.toISOString().slice(0,10))
      .order('created_at', { ascending: false }).limit(1000),
    // Open shifts regardless of age (an accidentally-left-open till must
    // surface), plus the recent closed window for the dashboard.
    sb.from('shifts').select('*')
      .or(`status.eq.open,opened_at.gte.${weekAgo.toISOString()}`)
      .order('opened_at', { ascending: false }).limit(200),
  ]);
  if (settingsR.data) { const s = mapSettingsFromDb(settingsR.data); state.settingsId = s._id; state.settings = s; }
  state.branches   = (branchesR.data   || []).map(mapBranchFromDb);
  state.staff      = (staffR.data      || []).map(mapStaffFromDb);
  state.categories = (categoriesR.data || []).map(mapCategoryFromDb);
  state.items      = (itemsR.data      || []).map(mapItemFromDb);
  state.branchOff  = (offR.data        || []).map(r => ({ itemId: r.item_id, branchId: r.branch_id }));
  state.orders     = (ordersR.data     || []).map(mapOrderFromDb);
  state.shifts     = (shiftsR?.data    || []).map(mapShiftFromDb);
}
async function loadOrderDetail(orderId) {
  if (state.orderDetailCache[orderId]) return state.orderDetailCache[orderId];
  const [itemsR, paysR] = await Promise.all([
    sb.from('order_items').select('*').eq('order_id', orderId),
    sb.from('order_payments').select('*').eq('order_id', orderId),
  ]);
  const detail = { items: (itemsR.data || []).map(mapOrderItemFromDb), payments: (paysR.data || []).map(mapPaymentFromDb) };
  state.orderDetailCache[orderId] = detail;
  return detail;
}

/* -------------------- AUTH -------------------- */
async function doLogin() {
  const email = $('#login-email').value.trim();
  const password = $('#login-password').value;
  if (!email || !password) { toast('Email and password required', 'error'); return; }
  const btn = $('#login-submit'); if (btn) btn.disabled = true;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (btn) btn.disabled = false;
  if (error) { toast(error.message || 'Invalid credentials', 'error'); return; }
  await afterAuth(data.user);
}
async function doSignup() {
  const email = $('#su-email').value.trim();
  const password = $('#su-password').value;
  const firstName = $('#su-first').value.trim();
  const lastName = $('#su-last').value.trim();
  if (!email || password.length < 6) { toast('Email and a 6+ character password required', 'error'); return; }
  const { error } = await sb.auth.signUp({ email, password, options: { data: { first_name: firstName, last_name: lastName } } });
  if (error) { toast(error.message, 'error'); return; }
  toast('Account created — you can log in now.', 'success');
  authMode = 'login'; render();
}
async function afterAuth(user) {
  state.session = { userId: user.id, email: user.email, loggedAt: new Date().toISOString() };
  await loadAll();
  location.hash = hasRole('cashier') ? '#/pos' : '#/dashboard';
  render();
}
async function logout() {
  await sb.auth.signOut();
  state = emptyState();
  // Shared-tablet hygiene: reset every module-level transient var.
  posCart = []; posCategoryId = null; posOrderType = 'pickup'; posDiscount = null;
  _checkoutSplit = null; _itemPhoto = undefined; authMode = 'login';
  location.hash = '';
  render();
}

/* -------------------- ROUTING / SHELL -------------------- */
const routes = ['dashboard', 'pos', 'orders', 'menu', 'branches', 'staff', 'settings'];
let authMode = 'login';
function getRoute() {
  const h = (location.hash || '').replace(/^#\/?/, '').split('/')[0];
  return routes.includes(h) ? h : (hasRole('cashier') ? 'pos' : 'dashboard');
}
window.addEventListener('hashchange', () => render());

function navItems() {
  return [
    { key:'dashboard', label:'Dashboard', show: hasRole('admin','manager') },
    { key:'pos',       label:'POS',       show: true },
    { key:'orders',    label:'Orders',    show: true },
    { key:'menu',      label:'Menu',      show: hasRole('admin','manager') },
    { key:'branches',  label:'Branches',  show: isAdmin() },
    { key:'staff',     label:'Staff',     show: isAdmin() },
    { key:'settings',  label:'Settings',  show: isAdmin() },
  ].filter(n => n.show);
}

function render() {
  try { renderMain(); }
  catch (e) {
    console.error('Render error:', e);
    $('#app').innerHTML = `<div class="min-h-screen flex items-center justify-center p-6"><div class="bg-white rounded-2xl shadow-card p-8 max-w-md text-center">
      <h2 class="font-display text-xl font-semibold text-slate-900">Something went wrong</h2>
      <p class="text-sm text-slate-500 mt-2">${escapeHTML(e.message)}</p>
      <button onclick="location.hash=''; render();" class="btn btn-primary mt-4">Back to safety</button></div></div>`;
  }
}
function renderMain() {
  const app = $('#app');
  if (!sb) { app.innerHTML = `<div class="min-h-screen flex items-center justify-center p-6"><div class="bg-white rounded-2xl shadow-card p-8 max-w-md text-center"><h2 class="font-display text-xl font-semibold text-slate-900">Not configured yet</h2><p class="text-sm text-slate-500 mt-2">Set SUPABASE_URL and SUPABASE_KEY in index.html to this project's Supabase credentials (or the CDN failed to load — check the network).</p></div></div>`; return; }
  if (!state.session) { app.innerHTML = renderLogin(); return; }
  const me = currentStaff();
  if (!me || !me.active) { app.innerHTML = renderNoAccessGate(); return; }
  const route = getRoute();
  let content = '';
  switch (route) {
    case 'pos':       content = renderPos(); break;
    case 'orders':    content = renderOrders(); break;
    case 'dashboard': content = hasRole('admin','manager') ? renderDashboard() : renderPos(); break;
    case 'menu':      content = hasRole('admin','manager') ? renderMenu() : renderPos(); break;
    case 'branches':  content = isAdmin() ? renderBranches() : renderPos(); break;
    case 'staff':     content = isAdmin() ? renderStaff() : renderPos(); break;
    case 'settings':  content = isAdmin() ? renderSettings() : renderPos(); break;
    default:          content = renderPos();
  }
  app.innerHTML = renderShell(content, route);
}

function renderShell(content, route) {
  const me = currentStaff();
  const nav = navItems().map(n => `
    <a href="#/${n.key}" class="px-3 py-2 rounded-xl text-sm font-semibold ${getRoute()===n.key ? 'bg-brand-700 text-white' : 'text-slate-600 hover:bg-brand-100'}">${escapeHTML(n.label)}</a>`).join('');
  return `
    <div class="min-h-screen flex flex-col">
      <header class="bg-white border-b border-brand-100 px-4 py-2.5 flex items-center gap-3 flex-wrap">
        <div class="font-display text-lg font-bold text-brand-800">Hassad <span class="text-brand-500">POS</span></div>
        <nav class="flex gap-1 flex-wrap">${nav}</nav>
        <div class="ms-auto flex items-center gap-3 text-sm text-slate-500">
          <span>${escapeHTML(me.firstName || me.email)}${me.branchId ? ` · ${escapeHTML(branchName(me.branchId))}` : ''} <span class="badge badge-slate">${escapeHTML(me.role)}</span></span>
          <button onclick="logout()" class="btn btn-ghost !py-1.5">Logout</button>
        </div>
      </header>
      <main class="flex-1 p-4 md:p-6 max-w-7xl w-full mx-auto">${content}</main>
    </div>`;
}

function renderLogin() {
  const isSignup = authMode === 'signup';
  return `
    <div class="min-h-screen flex items-center justify-center p-6">
      <div class="bg-white rounded-2xl shadow-pop p-8 w-full max-w-sm">
        <div class="text-center mb-6">
          <div class="font-display text-2xl font-bold text-brand-800">Hassad <span class="text-brand-500">POS</span></div>
          <p class="text-sm text-slate-500 mt-1">${isSignup ? 'Create your account' : 'Sign in to your branch'}</p>
        </div>
        ${isSignup ? `
        <form onsubmit="event.preventDefault(); doSignup();" class="space-y-3">
          <div class="grid grid-cols-2 gap-2">
            <div><label class="label">First name</label><input id="su-first" class="input"></div>
            <div><label class="label">Last name</label><input id="su-last" class="input"></div>
          </div>
          <div><label class="label">Email</label><input id="su-email" type="email" class="input" required></div>
          <div><label class="label">Password</label><input id="su-password" type="password" class="input" required minlength="6"></div>
          <button type="submit" class="btn btn-primary w-full">Create account</button>
          <p class="text-xs text-slate-400 text-center">Use the email your admin registered for you.</p>
        </form>
        <button onclick="authMode='login'; render();" class="btn btn-ghost w-full mt-3">Back to login</button>` : `
        <form onsubmit="event.preventDefault(); doLogin();" class="space-y-3">
          <div><label class="label">Email</label><input id="login-email" type="email" class="input" required></div>
          <div><label class="label">Password</label><input id="login-password" type="password" class="input" required></div>
          <button id="login-submit" type="submit" class="btn btn-primary w-full">Login</button>
        </form>
        <button onclick="authMode='signup'; render();" class="btn btn-ghost w-full mt-3">First time? Create account</button>`}
      </div>
    </div>`;
}
function renderNoAccessGate() {
  return `
    <div class="min-h-screen flex items-center justify-center p-6">
      <div class="bg-white rounded-2xl shadow-card p-8 max-w-md text-center">
        <h2 class="font-display text-xl font-semibold text-slate-900">No POS access</h2>
        <p class="text-sm text-slate-500 mt-2">Your account (${escapeHTML(state.session?.email || '')}) isn't registered as staff, or was deactivated. Ask the admin to add you, then log in again.</p>
        <button onclick="logout()" class="btn btn-primary mt-4">Logout</button>
      </div>
    </div>`;
}

/* -------------------- MODALS -------------------- */
let modalOnSave = null;
function openModal(title, bodyHTML, onSave, opts = {}) {
  closeModal();
  modalOnSave = onSave;
  const root = document.createElement('div');
  root.id = 'modal-root';
  root.innerHTML = `
    <div class="modal-box">
      <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
        <h3 class="font-display text-lg font-semibold text-slate-900">${escapeHTML(title)}</h3>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-xl leading-none">&times;</button>
      </div>
      <div class="p-6">${bodyHTML}</div>
      <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-2">
        <button onclick="closeModal()" class="btn btn-ghost">Cancel</button>
        ${onSave ? `<button id="modal-save" class="btn btn-primary">${escapeHTML(opts.saveLabel || 'Save')}</button>` : ''}
      </div>
    </div>`;
  root.addEventListener('click', e => { if (e.target === root) closeModal(); });
  document.body.appendChild(root);
  if (onSave) $('#modal-save').addEventListener('click', async () => {
    const ok = await modalOnSave();
    if (ok !== false) closeModal();
  });
}
function closeModal() {
  document.getElementById('modal-root')?.remove();
  modalOnSave = null;
  _checkoutSplit = null; // transient checkout state never bleeds into the next modal
  if (typeof _itemPhoto !== 'undefined') _itemPhoto = undefined;
}
document.addEventListener('keydown', e => { if (e.key === 'Escape' && document.getElementById('modal-root')) closeModal(); });

/* -------------------- POS CONSOLE -------------------- */
let posCart = [];        // [{itemId, nameEn, nameAr, unitPrice, qty}]
let posCategoryId = null;
let posOrderType = 'pickup';
let posDiscount = null;  // { amount, reason } — final SAR amount off the gross
let _checkoutSplit = null;

function posBranchId() {
  // Cashiers sell at their branch; admin/manager picks (defaults to first).
  return myBranchId() || state.branches.find(b => b.active)?.id || null;
}
function itemAvailableAt(itemId, branchId) {
  return !state.branchOff.some(o => o.itemId === itemId && o.branchId === branchId);
}
function cartTotals() {
  const gross = posCart.reduce((s, l) => s + l.unitPrice * l.qty, 0);
  // Discount comes off the VAT-inclusive gross; VAT is then derived from
  // what the customer actually pays (KSA VAT is owed on the discounted
  // consideration, not the shelf price).
  const discount = Math.min(posDiscount?.amount || 0, gross);
  const total = gross - discount;
  const vat = vatPortion(total, state.settings.vatRate);
  return { gross, discount, total, vat, subtotal: total - vat };
}
function addToCart(itemId) {
  const it = state.items.find(i => i.id === itemId); if (!it) return;
  const line = posCart.find(l => l.itemId === itemId);
  if (line) line.qty += 1;
  else posCart.push({ itemId: it.id, nameEn: it.nameEn, nameAr: it.nameAr, unitPrice: it.price, qty: 1 });
  render();
}
function cartQty(itemId, delta) {
  const line = posCart.find(l => l.itemId === itemId); if (!line) return;
  line.qty += delta;
  if (line.qty <= 0) posCart = posCart.filter(l => l !== line);
  render();
}
function clearCart() { posCart = []; posDiscount = null; posOrderType = 'pickup'; render(); }

function openDiscountModal() {
  const t = cartTotals();
  openModal('Discount', `
    <div class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">Amount (${escapeHTML(state.settings.currency)})</label>
          <input id="disc-amount" type="number" min="0" step="0.05" class="input" value="${posDiscount?.amount || ''}" placeholder="0.00" oninput="$('#disc-pct').value=''"></div>
        <div><label class="label">— or percent %</label>
          <input id="disc-pct" type="number" min="0" max="100" step="1" class="input" placeholder="e.g. 10" oninput="$('#disc-amount').value=''"></div>
      </div>
      <div><label class="label">Reason</label><input id="disc-reason" class="input" value="${escapeHTML(posDiscount?.reason || '')}" placeholder="e.g. staff drink, complaint goodwill"></div>
      <div class="text-xs text-slate-500">Cart gross: ${fmtMoney(t.gross)} — the discount and the recalculated VAT print on the receipt.</div>
    </div>`, async () => {
    const pct = parseFloat($('#disc-pct').value);
    let amount = parseFloat($('#disc-amount').value);
    if (!isNaN(pct) && pct > 0) amount = +(cartTotals().gross * Math.min(pct, 100) / 100).toFixed(2);
    const reason = $('#disc-reason').value.trim();
    if (isNaN(amount) || amount <= 0) { posDiscount = null; render(); return true; } // cleared
    if (amount > cartTotals().gross + 0.005) { toast('Discount cannot exceed the cart total', 'error'); return false; }
    if (!reason) { toast('A reason is required for discounts', 'error'); return false; }
    posDiscount = { amount: +amount.toFixed(2), reason };
    render();
    return true;
  }, { saveLabel: 'Apply' });
}

/* -------------------- TILL / SHIFT -------------------- */
function openShiftFor(branchId) {
  return state.shifts.find(s => s.branchId === branchId && s.status === 'open') || null;
}
// Cash expected in the drawer right now: float + cash payments of this
// shift's orders that are STILL completed (a same-shift return took the
// cash back out, so it nets to zero by exclusion).
function shiftExpectedCash(shift) {
  const orderIds = new Set(state.orders.filter(o => o.shiftId === shift.id && o.status === 'completed').map(o => o.id));
  let cash = 0;
  for (const id of orderIds) {
    const d = state.orderDetailCache[id];
    if (d) { cash += d.payments.filter(p => p.method === 'cash').reduce((s,p) => s + p.amount, 0); }
  }
  return { cash, float: shift.openingFloat, hasAllDetails: [...orderIds].every(id => state.orderDetailCache[id]) };
}
async function loadShiftCashDetails(shift) {
  // Pull payment rows for any of this shift's orders not yet cached.
  const ids = state.orders.filter(o => o.shiftId === shift.id && o.status === 'completed' && !state.orderDetailCache[o.id]).map(o => o.id);
  if (!ids.length) return;
  const [itemsR, paysR] = await Promise.all([
    sb.from('order_items').select('*').in('order_id', ids),
    sb.from('order_payments').select('*').in('order_id', ids),
  ]);
  ids.forEach(id => {
    state.orderDetailCache[id] = {
      items: (itemsR.data || []).filter(r => r.order_id === id).map(mapOrderItemFromDb),
      payments: (paysR.data || []).filter(r => r.order_id === id).map(mapPaymentFromDb),
    };
  });
}
function openTillModal() {
  const branchId = posBranchId();
  openModal('Open till — ' + branchName(branchId), `
    <div class="space-y-3">
      <div><label class="label">Opening float (${escapeHTML(state.settings.currency)})</label>
        <input id="till-float" type="number" min="0" step="0.05" class="input !text-lg" placeholder="e.g. 200.00"></div>
      <div class="bg-slate-50 rounded-xl p-3 text-xs text-slate-600">Count the cash you're putting in the drawer to start the day. The close-till reconciliation measures against this.</div>
    </div>`, async () => {
    const float = parseFloat($('#till-float').value);
    if (isNaN(float) || float < 0) { toast('Enter the opening float (0 is allowed)', 'error'); return false; }
    const me = currentStaff();
    const { data, error } = await sb.from('shifts').insert({
      branch_id: branchId, opening_float: +float.toFixed(2), opened_by: me?.id || null,
    }).select().single();
    if (error) {
      toast(error.code === '23505' ? 'A till is already open for this branch — reload.' : humanizeError(error), 'error');
      return false;
    }
    state.shifts.unshift(mapShiftFromDb(data));
    render(); toast('Till open — have a good shift', 'success');
    return true;
  }, { saveLabel: 'Open till' });
}
async function openCloseTillModal() {
  const branchId = posBranchId();
  const shift = openShiftFor(branchId);
  if (!shift) return;
  await loadShiftCashDetails(shift);
  const exp = shiftExpectedCash(shift);
  const expected = exp.float + exp.cash;
  const orders = state.orders.filter(o => o.shiftId === shift.id && o.status === 'completed');
  openModal('Close till — ' + branchName(branchId), `
    <div class="space-y-3">
      <div class="bg-slate-50 rounded-xl p-4 text-sm space-y-1">
        <div class="flex justify-between text-slate-600"><span>Opening float</span><span>${fmtMoney(exp.float)}</span></div>
        <div class="flex justify-between text-slate-600"><span>Cash sales (${orders.length} orders this shift)</span><span>${fmtMoney(exp.cash)}</span></div>
        <div class="flex justify-between font-bold text-slate-900 border-t border-slate-200 pt-1"><span>Expected in drawer</span><span>${fmtMoney(expected)}</span></div>
      </div>
      <div><label class="label">Counted cash (${escapeHTML(state.settings.currency)})</label>
        <input id="till-counted" type="number" min="0" step="0.05" class="input !text-lg" oninput="updateOverShort(${expected.toFixed(2)})"></div>
      <div id="till-overshort" class="text-sm font-semibold text-slate-600">Over/short: —</div>
      <div><label class="label">Notes (optional)</label><input id="till-notes" class="input" placeholder="e.g. reason for shortage, handover to..."></div>
    </div>`, async () => {
    const counted = parseFloat($('#till-counted').value);
    if (isNaN(counted) || counted < 0) { toast('Count the drawer and enter the amount', 'error'); return false; }
    const me = currentStaff();
    const { error } = await sb.from('shifts').update({
      status: 'closed', closed_by: me?.id || null, closed_at: new Date().toISOString(),
      expected_cash: +expected.toFixed(2), counted_cash: +counted.toFixed(2),
      over_short: +(counted - expected).toFixed(2), notes: $('#till-notes').value.trim() || null,
    }).eq('id', shift.id);
    if (error) { toast(humanizeError(error), 'error'); return false; }
    shift.status = 'closed'; shift.expectedCash = +expected.toFixed(2);
    shift.countedCash = +counted.toFixed(2); shift.overShort = +(counted - expected).toFixed(2);
    render();
    const os = counted - expected;
    toast(Math.abs(os) < 0.005 ? 'Till closed — drawer balanced ✓' : `Till closed — ${os > 0 ? 'over' : 'short'} ${fmtMoney(Math.abs(os))}`, Math.abs(os) < 0.005 ? 'success' : 'info');
    return true;
  }, { saveLabel: 'Close till' });
}
function updateOverShort(expected) {
  const counted = parseFloat($('#till-counted')?.value);
  const el = $('#till-overshort'); if (!el) return;
  if (isNaN(counted)) { el.textContent = 'Over/short: —'; el.style.color = ''; return; }
  const os = counted - expected;
  el.textContent = 'Over/short: ' + (os > 0 ? '+' : '') + fmtMoney(os);
  el.style.color = Math.abs(os) < 0.005 ? '#047857' : '#b91c1c';
}

/* -------------------- CHECKOUT -------------------- */
function openCheckoutModal() {
  if (!posCart.length) return;
  if (!openShiftFor(posBranchId())) { toast('Open the till first', 'error'); return; }
  const t = cartTotals();
  const body = `
    <div class="space-y-4">
      <div class="text-center">
        <div class="text-xs uppercase tracking-wider text-slate-500 font-semibold">Amount due</div>
        <div class="font-display text-4xl font-bold text-slate-900 mt-1">${fmtMoney(t.total)} <span class="text-base">${escapeHTML(state.settings.currency)}</span></div>
      </div>
      <div class="grid grid-cols-3 gap-2">
        <button onclick="checkoutSetMethod('cash')" id="pay-cash" class="btn btn-ghost !py-3">Cash</button>
        <button onclick="checkoutSetMethod('mada')" id="pay-mada" class="btn btn-ghost !py-3">mada</button>
        <button onclick="checkoutSetMethod('split')" id="pay-split" class="btn btn-ghost !py-3">Split</button>
      </div>
      <div id="pay-detail"></div>
    </div>`;
  openModal('Checkout', body, async () => saveOrder(), { saveLabel: 'Complete order' });
  checkoutSetMethod('cash');
}
function checkoutSetMethod(m) {
  _checkoutSplit = { method: m };
  ['cash','mada','split'].forEach(x => {
    const b = $('#pay-' + x); if (!b) return;
    b.classList.toggle('btn-primary', x === m);
    b.classList.toggle('btn-ghost', x !== m);
  });
  const t = cartTotals();
  const d = $('#pay-detail'); if (!d) return;
  if (m === 'cash') {
    d.innerHTML = `
      <label class="label">Cash received</label>
      <input id="cash-tendered" type="number" min="0" step="0.05" class="input !text-lg" value="${t.total.toFixed(2)}" oninput="updateChange()">
      <div id="cash-change" class="text-sm text-slate-600 mt-2 font-semibold">Change: 0.00</div>`;
  } else if (m === 'mada') {
    d.innerHTML = `<div class="bg-slate-50 rounded-xl p-3 text-sm text-slate-600">Process ${fmtMoney(t.total)} on the mada terminal, then complete the order. Card details never enter the POS.</div>`;
  } else {
    d.innerHTML = `
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">Cash part</label><input id="split-cash" type="number" min="0" step="0.05" class="input" value="0" oninput="updateSplit()"></div>
        <div><label class="label">mada part</label><input id="split-mada" type="number" min="0" step="0.05" class="input" value="${t.total.toFixed(2)}" oninput="updateSplit()"></div>
      </div>
      <div id="split-check" class="text-sm mt-2 font-semibold"></div>`;
    updateSplit();
  }
}
function updateChange() {
  const t = cartTotals();
  const tendered = parseFloat($('#cash-tendered')?.value) || 0;
  const c = $('#cash-change');
  if (c) { const ch = tendered - t.total; c.textContent = 'Change: ' + fmtMoney(Math.max(0, ch)); c.style.color = ch < 0 ? '#b91c1c' : ''; }
}
function updateSplit() {
  const t = cartTotals();
  const cash = parseFloat($('#split-cash')?.value) || 0;
  const mada = parseFloat($('#split-mada')?.value) || 0;
  const el = $('#split-check'); if (!el) return;
  const diff = t.total - cash - mada;
  el.textContent = Math.abs(diff) < 0.005 ? '✓ Adds up' : (diff > 0 ? `${fmtMoney(diff)} short` : `${fmtMoney(-diff)} over`);
  el.style.color = Math.abs(diff) < 0.005 ? '#047857' : '#b91c1c';
}

async function saveOrder() {
  const t = cartTotals();
  const m = _checkoutSplit?.method || 'cash';
  let payments = [];
  if (m === 'cash') {
    const tendered = parseFloat($('#cash-tendered')?.value) || 0;
    if (tendered < t.total - 0.005) { toast('Cash received is less than the total', 'error'); return false; }
    payments = [{ method:'cash', amount: t.total, tendered, change_given: Math.max(0, tendered - t.total) }];
  } else if (m === 'mada') {
    payments = [{ method:'mada', amount: t.total }];
  } else {
    const cash = parseFloat($('#split-cash')?.value) || 0;
    const mada = parseFloat($('#split-mada')?.value) || 0;
    if (Math.abs(cash + mada - t.total) > 0.005) { toast('Split amounts must add up to the total', 'error'); return false; }
    payments = [];
    if (cash > 0) payments.push({ method:'cash', amount: cash });
    if (mada > 0) payments.push({ method:'mada', amount: mada });
  }
  const branchId = posBranchId();
  const me = currentStaff();
  const shift = openShiftFor(branchId);
  if (!shift) { toast('The till is closed — open it first', 'error'); return false; }
  const orderRow = { branch_id: branchId, business_date: todayISO(), status: 'completed',
    subtotal: +t.subtotal.toFixed(2), vat_amount: +t.vat.toFixed(2), total: +t.total.toFixed(2), cashier_id: me?.id || null,
    order_type: posOrderType, discount_amount: +t.discount.toFixed(2),
    discount_reason: t.discount > 0 ? (posDiscount?.reason || null) : null,
    shift_id: shift.id };

  // Insert; the DB trigger assigns order_no. Concurrent cashiers on one
  // branch can collide on the unique (branch, date, no) — retry once.
  let order = null;
  for (let attempt = 0; attempt < 2 && !order; attempt++) {
    const { data, error } = await sb.from('orders').insert(orderRow).select().single();
    if (error) {
      if (error.code === '23505' && attempt === 0) continue;
      toast(humanizeError(error), 'error'); return false;
    }
    order = data;
  }
  if (!order) { toast('Could not save the order — try again', 'error'); return false; }

  const lineRows = posCart.map(l => ({ order_id: order.id, item_id: l.itemId, name_en: l.nameEn, name_ar: l.nameAr,
    unit_price: +l.unitPrice.toFixed(2), qty: l.qty, line_total: +(l.unitPrice * l.qty).toFixed(2) }));
  const { error: liErr } = await sb.from('order_items').insert(lineRows);
  if (liErr) { await sb.from('orders').delete().eq('id', order.id); toast(humanizeError(liErr), 'error'); return false; }
  const { error: payErr } = await sb.from('order_payments').insert(payments.map(p => ({ ...p, order_id: order.id })));
  if (payErr) { toast('Order saved but payment record failed: ' + humanizeError(payErr), 'error'); }

  const mapped = mapOrderFromDb(order);
  state.orders.unshift(mapped);
  state.orderDetailCache[order.id] = { items: lineRows.map(mapOrderItemFromDb), payments: payments.map((p,i) => mapPaymentFromDb({ ...p, id:'tmp'+i, order_id: order.id })) };
  posCart = []; posDiscount = null; posOrderType = 'pickup';
  render();
  toast(`Order #${mapped.orderNo} completed`, 'success');
  printReceipt(mapped.id);
  return true;
}

async function voidOrder(orderId) {
  const reason = prompt('Void reason (required) — use Void for mistakes caught before handover; use Return if the customer paid and got money back:');

async function returnOrder(orderId) {
  const o = state.orders.find(x => x.id === orderId);
  if (!o) return;
  const reason = prompt(`Return order #${o.orderNo} (${fmtMoney(o.total)} ${state.settings.currency}) — reason (required):`);

/* -------------------- RECEIPT + ZATCA QR -------------------- */
// ZATCA Phase-1 simplified invoice QR: TLV tags 1-5 (seller legal name,
// VAT number, ISO timestamp, total incl VAT, VAT amount), base64, QR.
// Ported from the HR app's B2B invoice module. Returns '' if the QR
// lib failed to load — the receipt prints without a QR, never crashes.
function zatcaQrDataUrl(order) {
  if (typeof qrcode === 'undefined') return '';
  try {
    const enc = new TextEncoder();
    const tlv = (tag, str) => { const b = enc.encode(String(str)); return [tag, b.length, ...b]; };
    const bytes = [
      ...tlv(1, state.settings.companyName),
      ...tlv(2, state.settings.vatNumber),
      ...tlv(3, new Date(order.createdAt).toISOString()),
      ...tlv(4, Number(order.total).toFixed(2)),
      ...tlv(5, Number(order.vatAmount).toFixed(2)),
    ];
    const b64 = btoa(String.fromCharCode.apply(null, bytes));
    const qr = qrcode(0, 'M');
    qr.addData(b64); qr.make();
    return qr.createDataURL(4, 8);
  } catch (e) { console.error('ZATCA QR failed:', e); return ''; }
}
// Blob-URL popup — document.write into about:blank saves BLANK PDFs in
// Safari (HR app PR #156 lesson).
function openPrintWindow(html) {
  const url = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
  const w = window.open(url, '_blank');
  if (!w) toast('Popup blocked — allow popups to print receipts', 'error');
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}

let _itemPhoto = undefined; // undefined = untouched, '' = removed, 'data:...' = new photo
function handleItemPhotoFile(input) {
  const file = input.files?.[0];
  if (!file) return;
  if (!['image/jpeg','image/png','image/webp'].includes(file.type)) { toast('JPG, PNG or WebP only', 'error'); input.value=''; return; }
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    // Resize to max 400px and recompress — keeps the row tiny (~20-40KB)
    // so bulk-loading the menu stays cheap (HR-app photo-OOM lesson).
    const scale = Math.min(1, 400 / Math.max(img.width, img.height));
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    _itemPhoto = canvas.toDataURL('image/jpeg', 0.72);
    URL.revokeObjectURL(url);
    const prev = $('#item-photo-preview');
    if (prev) prev.innerHTML = `<img src="${_itemPhoto}" class="w-16 h-16 rounded-xl object-cover">`;
  };
  img.onerror = () => { URL.revokeObjectURL(url); toast('Could not read that image', 'error'); };
  img.src = url;
}

    const offRows = state.branches.filter(b => b.active && !wanted.has(b.id)).map(b => ({ item_id: itemId, branch_id: b.id }));
    await sb.from('menu_item_branch_off').delete().eq('item_id', itemId);
    if (offRows.length) await sb.from('menu_item_branch_off').insert(offRows);
    await loadAll(); render(); toast('Saved', 'success');
  });
}

/* -------------------- BRANCHES / STAFF / SETTINGS -------------------- */
function renderBranches() {
  return `
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-display text-2xl font-semibold text-slate-900">Branches</h2>
      <button onclick="openBranchModal(null)" class="btn btn-primary">+ Branch</button>
    </div>
    <div class="bg-white rounded-2xl shadow-card divide-y divide-slate-100">
      ${state.branches.map(b => `
        <div class="px-5 py-3 flex items-center gap-3 ${b.active ? '' : 'opacity-50'}">
          <div class="flex-1 font-medium">${escapeHTML(b.name)} ${b.nameAr ? `<span class="text-slate-400 text-sm" dir="rtl">${escapeHTML(b.nameAr)}</span>` : ''} ${b.active ? '' : '<span class="badge badge-slate">Inactive</span>'}</div>
          <button onclick="openBranchModal('${b.id}')" class="btn btn-ghost !py-1 !px-2.5 !text-xs">Edit</button>
        </div>`).join('')}
    </div>`;
}
function openBranchModal(id) {
  const editing = id ? state.branches.find(b => b.id === id) : null;
  openModal(editing ? 'Edit branch' : 'New branch', `
    <div class="space-y-3">
      <div><label class="label">Name</label><input id="br-name" class="input" value="${escapeHTML(editing?.name || '')}" placeholder="e.g. KHOBAR"></div>
      <div><label class="label">Name (Arabic)</label><input id="br-ar" class="input" dir="rtl" value="${escapeHTML(editing?.nameAr || '')}"></div>
      <div><label class="label">Active</label><select id="br-active" class="input"><option value="1" ${editing?.active !== false ? 'selected':''}>Yes</option><option value="0" ${editing?.active === false ? 'selected':''}>No</option></select></div>
    </div>`, async () => {
    const row = { name: $('#br-name').value.trim().toUpperCase(), name_ar: $('#br-ar').value.trim(), active: $('#br-active').value === '1' };
    if (!row.name) { toast('Name required', 'error'); return false; }
    const q = editing ? sb.from('branches').update(row).eq('id', editing.id) : sb.from('branches').insert(row);
    const { error } = await q;
    if (error) { toast(humanizeError(error), 'error'); return false; }
    await loadAll(); render(); toast('Saved', 'success');
  });
}
function renderStaff() {
  return `
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-display text-2xl font-semibold text-slate-900">Staff</h2>
      <button onclick="openStaffModal(null)" class="btn btn-primary">+ Staff</button>
    </div>
    <div class="bg-white rounded-2xl shadow-card overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="text-[10px] uppercase tracking-wider text-slate-500 bg-slate-50/60 border-b border-slate-100">
          <th class="text-start px-4 py-2.5">Name</th><th class="text-start px-4 py-2.5">Email</th><th class="text-start px-4 py-2.5">Role</th>
          <th class="text-start px-4 py-2.5">Branch</th><th class="text-start px-4 py-2.5">Login</th><th class="px-4 py-2.5"></th></tr></thead>
        <tbody class="divide-y divide-slate-100">
          ${state.staff.map(s => `
            <tr class="${s.active ? '' : 'opacity-50'}">
              <td class="px-4 py-2.5 font-medium">${escapeHTML((s.firstName + ' ' + s.lastName).trim() || '—')}</td>
              <td class="px-4 py-2.5 text-slate-600">${escapeHTML(s.email)}</td>
              <td class="px-4 py-2.5"><span class="badge badge-slate">${escapeHTML(s.role)}</span></td>
              <td class="px-4 py-2.5">${escapeHTML(s.branchId ? branchName(s.branchId) : '—')}</td>
              <td class="px-4 py-2.5">${s.userId ? '<span class="badge badge-green">Linked</span>' : '<span class="badge badge-amber">Awaiting signup</span>'}</td>
              <td class="px-4 py-2.5 text-end"><button onclick="openStaffModal('${s.id}')" class="btn btn-ghost !py-1 !px-2.5 !text-xs">Edit</button></td>
            </tr>`).join('')}
        </tbody></table>
    </div>
    <p class="text-xs text-slate-500 mt-3">Add a staff member here first, then have them use "Create account" on the login screen with the same email — it links automatically.</p>`;
}
function openStaffModal(id) {
  const editing = id ? state.staff.find(s => s.id === id) : null;
  openModal(editing ? 'Edit staff' : 'New staff', `
    <div class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">First name</label><input id="st-first" class="input" value="${escapeHTML(editing?.firstName || '')}"></div>
        <div><label class="label">Last name</label><input id="st-last" class="input" value="${escapeHTML(editing?.lastName || '')}"></div>
      </div>
      <div><label class="label">Email</label><input id="st-email" type="email" class="input" value="${escapeHTML(editing?.email || '')}" ${editing?.userId ? 'disabled' : ''}></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">Role</label><select id="st-role" class="input">
          ${['admin','manager','cashier'].map(r => `<option value="${r}" ${editing?.role === r ? 'selected':''}>${r}</option>`).join('')}</select></div>
        <div><label class="label">Branch</label><select id="st-branch" class="input">
          <option value="">— None —</option>
          ${state.branches.filter(b => b.active).map(b => `<option value="${b.id}" ${editing?.branchId === b.id ? 'selected':''}>${escapeHTML(b.name)}</option>`).join('')}</select></div>
      </div>
      <div><label class="label">Active</label><select id="st-active" class="input"><option value="1" ${editing?.active !== false ? 'selected':''}>Yes</option><option value="0" ${editing?.active === false ? 'selected':''}>No</option></select></div>
      ${!editing ? '<div class="bg-amber-50 border border-amber-100 rounded-xl p-3 text-xs text-amber-800">Cashiers must have a branch — RLS blocks their orders otherwise.</div>' : ''}
    </div>`, async () => {
    const row = { first_name: $('#st-first').value.trim(), last_name: $('#st-last').value.trim(),
      email: $('#st-email').value.trim().toLowerCase(), role: $('#st-role').value,
      branch_id: $('#st-branch').value || null, active: $('#st-active').value === '1' };
    if (!row.email) { toast('Email required', 'error'); return false; }
    if (row.role === 'cashier' && !row.branch_id) { toast('Cashiers need a branch', 'error'); return false; }
    if (editing?.userId) delete row.email; // linked accounts keep their email
    const q = editing ? sb.from('staff').update(row).eq('id', editing.id) : sb.from('staff').insert(row);
    const { error } = await q;
    if (error) { toast(humanizeError(error), 'error'); return false; }
    await loadAll(); render(); toast('Saved', 'success');
  });
}
function renderSettings() {
  const s = state.settings;
  return `
    <h2 class="font-display text-2xl font-semibold text-slate-900 mb-4">Settings</h2>
    <div class="bg-white rounded-2xl shadow-card p-6 max-w-2xl space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">Company name (legal, EN)</label><input id="set-name" class="input" value="${escapeHTML(s.companyName)}"></div>
        <div><label class="label">Company name (AR)</label><input id="set-name-ar" class="input" dir="rtl" value="${escapeHTML(s.companyNameAr)}"></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">VAT number</label><input id="set-vat" class="input" value="${escapeHTML(s.vatNumber)}" placeholder="3xxxxxxxxxxxxx3"><div class="text-[10px] text-slate-500 mt-1">Encoded into the ZATCA QR on every receipt.</div></div>
        <div><label class="label">C.R. number</label><input id="set-cr" class="input" value="${escapeHTML(s.crNumber)}"></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">Currency</label><input id="set-currency" class="input" value="${escapeHTML(s.currency)}"></div>
        <div><label class="label">VAT rate %</label><input id="set-rate" type="number" min="0" step="0.01" class="input" value="${s.vatRate}"></div>
      </div>
      <div><label class="label">Receipt footer (EN)</label><input id="set-footer-en" class="input" value="${escapeHTML(s.receiptFooterEn)}"></div>
      <div><label class="label">Receipt footer (AR)</label><input id="set-footer-ar" class="input" dir="rtl" value="${escapeHTML(s.receiptFooterAr)}"></div>
      <button onclick="saveSettings()" class="btn btn-primary">Save settings</button>
    </div>`;
}
async function saveSettings() {
  const row = { company_name: $('#set-name').value.trim(), company_name_ar: $('#set-name-ar').value.trim(),
    vat_number: $('#set-vat').value.trim(), cr_number: $('#set-cr').value.trim(),
    currency: $('#set-currency').value.trim() || 'SAR', vat_rate: parseFloat($('#set-rate').value) || 15,
    receipt_footer_en: $('#set-footer-en').value.trim(), receipt_footer_ar: $('#set-footer-ar').value.trim(), updated_at: new Date().toISOString() };
  const { error } = await sb.from('pos_settings').update(row).eq('id', state.settingsId);
  if (error) { toast(humanizeError(error), 'error'); return; }
  await loadAll(); render(); toast('Settings saved', 'success');
}

/* -------------------- INIT -------------------- */
async function bootstrap() {
  if (!sb) { render(); return; }
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) {
      state.session = { userId: session.user.id, email: session.user.email, loggedAt: new Date().toISOString() };
      await loadAll();
    }
  } catch (e) { console.error('Bootstrap error:', e); }
  render();
  sb?.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_OUT') { state = emptyState(); posCart = []; location.hash = ''; render(); }
    else if (event === 'SIGNED_IN' && session?.user && !state.session) {
      state.session = { userId: session.user.id, email: session.user.email, loggedAt: new Date().toISOString() };
      await loadAll(); render();
    }
  });
}
bootstrap();
</script>
</body>
